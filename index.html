<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="systemPageTitle">雲端文庫 - 文件與網站分享系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 可愛圓潤風格字體與基本設定 */
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        
        :root {
            --bg-outer: #F4E6D9; /* 外層淺橘粉色 */
            --bg-inner: #FDF8F3; /* 內層米白色 */
            --text-main: #5C4A3D; /* 深棕色文字 */
            
            /* 標籤/按鈕的五個主題色 */
            --color-red: #CD7B71;
            --color-yellow: #EFD28D;
            --color-green: #99B44F;
            --color-blue: #86A7C1;
            --color-pink: #F1CBBE;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg-outer);
            color: var(--text-main);
            /* 外層增加一些留白，讓內層看起來像是一張卡片 */
            padding: 1rem;
        }

        /* 標題與特殊文字使用 Fredoka 或更粗的黑體 */
        h1, h2, h3, .rounded-font {
            font-family: 'Fredoka', 'Noto Sans TC', sans-serif;
            font-weight: 700;
        }

        .main-container {
            background-color: var(--bg-inner);
            border-radius: 2rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            border: 4px solid #ffffff;
        }

        .card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 20px -8px rgba(92, 74, 61, 0.15);
        }

        /* 隱藏捲軸但保留功能 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* 模態框淡入動畫 */
        .modal-fade {
            animation: fadeIn 0.2s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* 客製化輸入框與選擇框 */
        .cute-input {
            border: 2px solid #E5D5C5;
            border-radius: 9999px; /* 膠囊狀 */
            background-color: #ffffff;
            color: var(--text-main);
            transition: border-color 0.2s;
        }
        .cute-input:focus {
            outline: none;
            border-color: var(--color-green);
        }
        textarea.cute-input {
            border-radius: 1.5rem; /* 文本框用一般大圓角 */
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center">

    <!-- 主體大卡片容器 -->
    <div class="main-container w-full max-w-6xl flex-grow flex flex-col overflow-hidden relative">
        
        <!-- 頂部導覽列 -->
        <header class="py-5 px-6 md:px-10 flex justify-between items-center sticky top-0 z-40 bg-[var(--bg-inner)]/90 backdrop-blur-md border-b-2 border-[#F4E6D9]">
            <!-- 點擊標題回首頁 -->
            <div class="flex items-center gap-3 cursor-pointer group" onclick="app.goHome()" title="回首頁">
                <i class="fa-solid fa-seedling text-3xl text-[var(--color-green)] group-hover:scale-110 transition-transform"></i>
                <h1 id="systemHeaderTitle" class="text-3xl text-[var(--text-main)] rounded-font group-hover:text-[var(--color-red)] transition-colors tracking-wide">雲端文庫</h1>
            </div>
            
            <div class="flex items-center gap-4">
                <div id="userInfo" class="hidden text-sm md:text-base font-medium">
                    <span class="mr-3 text-[var(--text-main)]"><i class="fa-solid fa-user-circle text-[var(--color-blue)]"></i> <span id="currentUserName"></span></span>
                    <button onclick="app.logout()" class="text-gray-400 hover:text-[var(--color-red)] transition">登出</button>
                </div>
                <button id="loginBtn" onclick="app.openModal('loginModal')" class="bg-[var(--color-yellow)] text-[var(--text-main)] px-6 py-2 rounded-full hover:brightness-105 transition font-bold shadow-sm">
                    登入
                </button>
            </div>
        </header>

        <!-- 主內容區 -->
        <main class="flex-grow px-6 md:px-10 py-8">
            
            <!-- 管理員工具列 -->
            <div id="adminToolbar" class="hidden mb-8 bg-white p-5 rounded-[2rem] shadow-sm border-2 border-[#F4E6D9] flex flex-wrap gap-4 items-center justify-between">
                <div class="flex gap-3">
                    <button onclick="app.openModal('resourceModal')" class="bg-[var(--color-green)] text-white font-bold px-6 py-2.5 rounded-full hover:brightness-105 transition shadow-sm">
                        <i class="fa-solid fa-plus mr-1"></i> 新增文件 / 網站
                    </button>
                </div>
                <div id="accountManagerBtn" class="hidden">
                    <button onclick="app.openModal('settingsModal')" class="bg-[var(--color-blue)] text-white font-bold px-6 py-2.5 rounded-full hover:brightness-105 transition shadow-sm">
                        <i class="fa-solid fa-sliders-h mr-1"></i> 系統設定
                    </button>
                </div>
            </div>

            <!-- 搜尋與篩選列 -->
            <div class="mb-8 flex flex-col md:flex-row gap-4 items-center justify-between">
                <div class="flex-grow w-full md:w-auto relative">
                    <i class="fa-solid fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                    <input type="text" id="searchInput" placeholder="搜尋標題或描述..." class="cute-input w-full pl-11 pr-4 py-2.5 shadow-sm" oninput="app.handleSearch()">
                </div>
                <div class="w-full md:w-auto flex gap-3">
                    <select id="typeFilter" class="cute-input px-4 py-2.5 shadow-sm cursor-pointer" onchange="app.handleFilter()">
                        <option value="all">所有類型</option>
                        <option value="document">文件檔案</option>
                        <option value="link">網站連結</option>
                        <option value="drive">雲端硬碟</option>
                    </select>
                    <select id="categoryFilter" class="cute-input px-4 py-2.5 shadow-sm cursor-pointer min-w-[120px]" onchange="app.handleFilter()">
                        <option value="all">所有分類</option>
                        <!-- 動態生成分類 -->
                    </select>
                </div>
            </div>

            <!-- 資源列表 -->
            <div id="resourceContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-6">
                <!-- 資源卡片動態生成 -->
                <div class="text-center col-span-full py-20 text-[var(--text-main)] opacity-60">
                    <i class="fa-solid fa-seedling animate-bounce text-4xl mb-4"></i>
                    <p class="font-bold text-lg">資料發芽中，請稍候...</p>
                </div>
            </div>

            <!-- 分頁控制 -->
            <div id="pagination" class="mt-12 mb-4 flex justify-center items-center gap-2 font-bold">
                <!-- 分頁按鈕動態生成 -->
            </div>

        </main>

        <footer class="text-center py-6 text-sm text-[var(--text-main)] opacity-70 mt-auto border-t-2 border-[#F4E6D9] bg-[#FDF8F3]">
            <p id="systemFooterTitle">&copy; 2026 雲端文庫. All rights reserved.</p>
        </footer>
    </div>

    <!-- ================= 模態框 (Modals) ================= -->

    <!-- 1. 登入模態框 -->
    <div id="loginModal" class="hidden fixed inset-0 bg-[var(--text-main)] bg-opacity-40 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-[var(--bg-inner)] rounded-[2rem] shadow-2xl w-full max-w-md overflow-hidden modal-fade border-4 border-white">
            <div class="px-8 py-6 text-center border-b-2 border-[#F4E6D9]">
                <h2 class="text-2xl font-bold rounded-font text-[var(--text-main)]"><i class="fa-solid fa-leaf text-[var(--color-green)] mr-2"></i>登入文庫</h2>
            </div>
            <div class="p-8">
                <button onclick="app.closeModal('loginModal')" class="absolute top-6 right-6 text-gray-400 hover:text-[var(--color-red)] text-xl"><i class="fa-solid fa-times"></i></button>
                
                <div id="loginError" class="hidden mb-4 p-3 bg-red-100 text-red-700 rounded-xl text-sm font-bold text-center"></div>
                <div id="initAdminNotice" class="hidden mb-4 p-3 bg-[var(--color-blue)] bg-opacity-20 text-[var(--color-blue)] rounded-xl text-sm font-bold text-center">
                    <i class="fa-solid fa-info-circle mr-1"></i> 系統無帳號，請建立首位管理員
                </div>
                
                <div class="mb-5">
                    <label class="block text-sm font-bold text-[var(--text-main)] mb-2 ml-2">帳號</label>
                    <input type="text" id="loginUsername" class="cute-input w-full px-4 py-3">
                </div>
                <div class="mb-8">
                    <label class="block text-sm font-bold text-[var(--text-main)] mb-2 ml-2">密碼</label>
                    <input type="password" id="loginPassword" class="cute-input w-full px-4 py-3">
                </div>
                <button id="submitLoginBtn" onclick="app.processLogin()" class="w-full bg-[var(--color-green)] text-white text-lg py-3 rounded-full hover:brightness-105 transition font-bold shadow-md">進入</button>
            </div>
        </div>
    </div>

    <!-- 2. 新增/編輯 資源模態框 -->
    <div id="resourceModal" class="hidden fixed inset-0 bg-[var(--text-main)] bg-opacity-40 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-[var(--bg-inner)] rounded-[2rem] shadow-2xl w-full max-w-lg overflow-hidden modal-fade border-4 border-white">
            <div class="px-8 py-6 flex justify-between items-center border-b-2 border-[#F4E6D9]">
                <h2 id="resourceModalTitle" class="text-2xl font-bold rounded-font text-[var(--text-main)]">新增文件 / 網站</h2>
                <button onclick="app.closeModal('resourceModal')" class="text-gray-400 hover:text-[var(--color-red)] text-xl"><i class="fa-solid fa-times"></i></button>
            </div>
            <div class="p-8 max-h-[75vh] overflow-y-auto no-scrollbar">
                <input type="hidden" id="resId">
                
                <div class="mb-5">
                    <label class="block text-sm font-bold text-[var(--text-main)] mb-2 ml-2">資源類型 <span class="text-[var(--color-red)]">*</span></label>
                    <div class="flex flex-wrap gap-3">
                        <label class="flex items-center cursor-pointer bg-white px-4 py-2 border-2 border-[#E5D5C5] rounded-full has-[:checked]:border-[var(--color-green)] has-[:checked]:bg-[var(--color-green)] has-[:checked]:bg-opacity-10 transition">
                            <input type="radio" name="resType" value="document" checked class="hidden"> 
                            <i class="fa-regular fa-file-alt mr-2 text-[var(--text-main)]"></i> <span class="font-bold text-[var(--text-main)] text-sm">文件檔案</span>
                        </label>
                        <label class="flex items-center cursor-pointer bg-white px-4 py-2 border-2 border-[#E5D5C5] rounded-full has-[:checked]:border-[var(--color-green)] has-[:checked]:bg-[var(--color-green)] has-[:checked]:bg-opacity-10 transition">
                            <input type="radio" name="resType" value="link" class="hidden"> 
                            <i class="fa-solid fa-link mr-2 text-[var(--text-main)]"></i> <span class="font-bold text-[var(--text-main)] text-sm">網站連結</span>
                        </label>
                        <label class="flex items-center cursor-pointer bg-white px-4 py-2 border-2 border-[#E5D5C5] rounded-full has-[:checked]:border-[var(--color-green)] has-[:checked]:bg-[var(--color-green)] has-[:checked]:bg-opacity-10 transition">
                            <input type="radio" name="resType" value="drive" class="hidden"> 
                            <i class="fa-brands fa-google-drive mr-2 text-[var(--text-main)]"></i> <span class="font-bold text-[var(--text-main)] text-sm">雲端硬碟</span>
                        </label>
                    </div>
                </div>

                <div class="mb-5">
                    <label class="block text-sm font-bold text-[var(--text-main)] mb-2 ml-2">標題名稱 <span class="text-[var(--color-red)]">*</span></label>
                    <input type="text" id="resTitle" placeholder="例如：2026年專案計畫書" class="cute-input w-full px-4 py-3">
                </div>

                <div class="mb-5">
                    <label class="block text-sm font-bold text-[var(--text-main)] mb-2 ml-2">連結網址 (URL) <span class="text-[var(--color-red)]">*</span></label>
                    <input type="url" id="resUrl" placeholder="https://..." class="cute-input w-full px-4 py-3">
                </div>

                <div class="mb-5">
                    <label class="block text-sm font-bold text-[var(--text-main)] mb-2 ml-2">選擇分類 <span class="text-[var(--color-red)]">*</span></label>
                    <select id="resCategory" class="cute-input w-full px-4 py-3 cursor-pointer">
                        <option value="">請選擇...</option>
                        <!-- 動態填充選項 -->
                    </select>
                </div>

                <div class="mb-8">
                    <label class="block text-sm font-bold text-[var(--text-main)] mb-2 ml-2">描述 (選填)</label>
                    <textarea id="resDesc" rows="3" class="cute-input w-full px-4 py-3 resize-none" placeholder="簡單描述內容..."></textarea>
                </div>

                <div class="flex justify-end gap-3">
                    <button onclick="app.closeModal('resourceModal')" class="px-6 py-2.5 rounded-full font-bold text-[var(--text-main)] hover:bg-[#E5D5C5] transition">取消</button>
                    <button onclick="app.saveResource()" class="bg-[var(--color-green)] text-white px-8 py-2.5 rounded-full font-bold hover:brightness-105 transition shadow-md">儲存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 3. 系統設定模態框 (帳號與分類管理，僅管理員可見) -->
    <div id="settingsModal" class="hidden fixed inset-0 bg-[var(--text-main)] bg-opacity-40 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-[var(--bg-inner)] rounded-[2rem] shadow-2xl w-full max-w-4xl overflow-hidden modal-fade flex flex-col max-h-[90vh] border-4 border-white">
            <div class="px-8 py-6 flex justify-between items-center border-b-2 border-[#F4E6D9] shrink-0 bg-white bg-opacity-50">
                <h2 class="text-2xl font-bold rounded-font text-[var(--text-main)]"><i class="fa-solid fa-sliders-h text-[var(--color-blue)] mr-2"></i>系統設定</h2>
                <button onclick="app.closeModal('settingsModal')" class="text-gray-400 hover:text-[var(--color-red)] text-xl"><i class="fa-solid fa-times"></i></button>
            </div>
            
            <div class="p-8 overflow-y-auto no-scrollbar flex-grow">
                
                <!-- 基本設定區塊 -->
                <div class="mb-12 bg-white p-6 rounded-3xl border-2 border-[#F4E6D9]">
                    <h3 class="font-bold text-lg mb-4 text-[var(--text-main)] flex items-center gap-2">
                        <i class="fa-solid fa-palette text-[var(--color-yellow)] text-xl"></i> 基本設定
                    </h3>
                    <div class="flex flex-col md:flex-row gap-4 max-w-2xl items-end">
                        <div class="flex-grow w-full">
                            <label class="block text-sm font-bold text-[var(--text-main)] mb-2 ml-2">更改網站名稱</label>
                            <input type="text" id="sysNameInput" placeholder="例如：雲端文庫" class="cute-input w-full px-4 py-2.5">
                        </div>
                        <button onclick="app.saveSystemName()" class="bg-[var(--color-yellow)] text-[var(--text-main)] font-bold px-6 py-2.5 rounded-full hover:brightness-105 transition whitespace-nowrap shadow-sm">更新名稱</button>
                    </div>
                </div>

                <!-- 分類管理區塊 -->
                <div class="mb-12 bg-white p-6 rounded-3xl border-2 border-[#F4E6D9]">
                    <h3 class="font-bold text-lg mb-4 text-[var(--text-main)] flex items-center gap-2">
                        <i class="fa-solid fa-tags text-[var(--color-pink)] text-xl"></i> 分類管理
                    </h3>
                    
                    <div class="mb-6 max-w-2xl">
                        <label class="block text-sm font-bold text-[var(--text-main)] mb-2 ml-2">新增分類名稱</label>
                        <div class="flex gap-3">
                            <input type="text" id="newCategoryInput" placeholder="輸入新分類..." class="cute-input flex-grow px-4 py-2.5">
                            <button onclick="app.saveManagedCategory()" class="bg-[var(--color-pink)] text-[var(--text-main)] font-bold px-6 py-2.5 rounded-full hover:brightness-105 transition whitespace-nowrap shadow-sm">新增</button>
                        </div>
                    </div>

                    <div class="bg-[var(--bg-inner)] border-2 border-[#F4E6D9] rounded-2xl p-5 min-h-[100px]">
                        <p class="text-sm font-bold text-gray-400 mb-3 ml-1">目前的分類清單：</p>
                        <div id="categoryPillList" class="flex flex-wrap gap-3">
                            <!-- 分類標籤動態生成 -->
                        </div>
                    </div>
                </div>

                <!-- 帳號管理區塊 -->
                <div class="bg-white p-6 rounded-3xl border-2 border-[#F4E6D9]">
                    <h3 class="font-bold text-lg mb-4 text-[var(--text-main)] flex items-center gap-2">
                        <i class="fa-solid fa-users text-[var(--color-blue)] text-xl"></i> 帳號管理
                    </h3>
                    <div class="w-full overflow-x-auto">
                        <table class="w-full text-left border-collapse min-w-[600px]">
                            <thead>
                                <tr class="border-b-2 border-[#F4E6D9]">
                                    <th class="p-3 font-bold text-[var(--text-main)] w-1/4">帳號</th>
                                    <th class="p-3 font-bold text-[var(--text-main)] w-1/4">密碼</th>
                                    <th class="p-3 font-bold text-[var(--text-main)] w-1/4">權限</th>
                                    <th class="p-3 font-bold text-[var(--text-main)] text-center w-1/4">操作</th>
                                </tr>
                            </thead>
                            <tbody id="userTableBody">
                                <!-- 用戶列表生成 -->
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- 提示訊息 (Toast) -->
    <div id="toast" class="fixed bottom-8 right-8 transform translate-y-20 opacity-0 transition-all duration-300 bg-[var(--text-main)] text-white px-6 py-4 rounded-full shadow-xl z-[60] flex items-center gap-3 font-bold">
        <i id="toastIcon" class="fa-solid fa-face-smile text-[var(--color-yellow)] text-xl"></i>
        <span id="toastMsg">操作成功</span>
    </div>

    <!-- Firebase SDK 引入 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, addDoc, updateDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
  apiKey: "AIzaSyDa0NveTZKEo5mODD3XhX_9bA_bPOtcPlQ",
  authDomain: "infor-aded2.firebaseapp.com",
  projectId: "infor-aded2",
  storageBucket: "infor-aded2.firebasestorage.app",
  messagingSenderId: "447138107771",
  appId: "1:447138107771:web:399443bb0e13475d766dde"
};

        const app_firebase = initializeApp(firebaseConfig);
        const auth = getAuth(app_firebase);
        const db = getFirestore(app_firebase);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-wafu-app';
        
        const USERS_COLLECTION = 'wafu_users';
        const RESOURCES_COLLECTION = 'wafu_resources';
        const CATEGORIES_COLLECTION = 'wafu_categories';
        const SETTINGS_COLLECTION = 'wafu_settings';

        // 可愛風主題色彩陣列，用於隨機指派標籤顏色
        const cuteColorPalette = [
            'bg-[#CD7B71] text-white',      // 紅
            'bg-[#EFD28D] text-[#5C4A3D]',  // 黃
            'bg-[#99B44F] text-white',      // 綠
            'bg-[#86A7C1] text-white',      // 藍
            'bg-[#F1CBBE] text-[#5C4A3D]'   // 粉
        ];

        window.appState = {
            fbUser: null,
            currentUser: null,
            resources: [],
            users: [],
            categories: [],
            managedCategories: [],
            systemName: "雲端文庫",
            currentPage: 1,
            itemsPerPage: 10,
            searchQuery: "",
            filterType: "all",
            filterCategory: "all"
        };

        window.app = {
            init: async function() {
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }

                    onAuthStateChanged(auth, (user) => {
                        if (user) {
                            window.appState.fbUser = user;
                            this.fetchData();
                        }
                    });
                } catch (error) {
                    console.error("初始化失敗:", error);
                }
            },

            fetchData: function() {
                const user = window.appState.fbUser;
                if (!user) return;

                const resRef = collection(db, 'artifacts', appId, 'public', 'data', RESOURCES_COLLECTION);
                onSnapshot(resRef, (snapshot) => {
                    window.appState.resources = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    this.extractCategories();
                    this.renderResources();
                });

                const catRef = collection(db, 'artifacts', appId, 'public', 'data', CATEGORIES_COLLECTION);
                onSnapshot(catRef, (snapshot) => {
                    window.appState.managedCategories = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    
                    if (window.appState.managedCategories.length === 0 && window.appState.currentUser?.role === 'admin') {
                        this.seedDefaultCategories();
                    }
                    this.extractCategories();
                    this.renderCategoryManager();
                });

                const sysRef = doc(db, 'artifacts', appId, 'public', 'data', SETTINGS_COLLECTION, 'global');
                onSnapshot(sysRef, (docSnap) => {
                    if (docSnap.exists() && docSnap.data().systemName) {
                        window.appState.systemName = docSnap.data().systemName;
                    }
                    this.updateSystemNameUI();
                });

                const usersRef = collection(db, 'artifacts', appId, 'public', 'data', USERS_COLLECTION);
                onSnapshot(usersRef, (snapshot) => {
                    window.appState.users = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    
                    const initNotice = document.getElementById('initAdminNotice');
                    const loginBtn = document.getElementById('submitLoginBtn');
                    
                    if (window.appState.users.length === 0) {
                        if(initNotice) initNotice.classList.remove('hidden');
                        if(loginBtn) loginBtn.innerText = "建立並登入管理員";
                    } else {
                        if(initNotice) initNotice.classList.add('hidden');
                        if(loginBtn) loginBtn.innerText = "進入";
                    }

                    if (window.appState.currentUser) {
                        const updatedUser = window.appState.users.find(u => u.id === window.appState.currentUser.id);
                        if (!updatedUser) this.logout();
                        else {
                            window.appState.currentUser = updatedUser;
                            this.updateUI();
                            if(updatedUser.role === 'admin') this.renderUsersTable();
                        }
                    }
                });
            },

            // 回首頁並清除搜尋與過濾條件
            goHome: function() {
                // UI 清空
                document.getElementById('searchInput').value = '';
                document.getElementById('typeFilter').value = 'all';
                document.getElementById('categoryFilter').value = 'all';
                
                // 狀態清空
                window.appState.searchQuery = '';
                window.appState.filterType = 'all';
                window.appState.filterCategory = 'all';
                window.appState.currentPage = 1;
                
                // 重新渲染並捲動到最上面
                this.renderResources();
                window.scrollTo({ top: 0, behavior: 'smooth' });
                this.showToast("已返回首頁");
            },

            processLogin: async function() {
                const user = window.appState.fbUser;
                if (!user) return;

                const usernameInput = document.getElementById('loginUsername').value.trim();
                const passwordInput = document.getElementById('loginPassword').value.trim();
                const errorDiv = document.getElementById('loginError');

                if (!usernameInput || !passwordInput) {
                    errorDiv.innerText = "請輸入帳號與密碼";
                    errorDiv.classList.remove('hidden'); return;
                }

                if (window.appState.users.length === 0) {
                    try {
                        const docRef = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', USERS_COLLECTION), {
                            username: usernameInput, password: passwordInput, role: 'admin', createdAt: Date.now()
                        });
                        window.appState.currentUser = { id: docRef.id, username: usernameInput, role: 'admin' };
                        this.finishLogin();
                        this.showToast("管理員建立成功");
                    } catch (e) {
                        errorDiv.innerText = "建立失敗：" + e.message;
                        errorDiv.classList.remove('hidden');
                    }
                    return;
                }

                const matchedUser = window.appState.users.find(u => u.username === usernameInput && u.password === passwordInput);
                if (matchedUser) {
                    window.appState.currentUser = matchedUser;
                    this.finishLogin();
                    this.showToast("登入成功");
                } else {
                    errorDiv.innerText = "帳號或密碼錯誤";
                    errorDiv.classList.remove('hidden');
                }
            },

            finishLogin: function() {
                document.getElementById('loginUsername').value = '';
                document.getElementById('loginPassword').value = '';
                document.getElementById('loginError').classList.add('hidden');
                this.closeModal('loginModal');
                this.updateUI();
            },

            logout: function() {
                window.appState.currentUser = null;
                this.updateUI();
                this.showToast("已登出");
            },

            updateUI: function() {
                const curUser = window.appState.currentUser;
                const loginBtn = document.getElementById('loginBtn');
                const userInfo = document.getElementById('userInfo');
                const adminToolbar = document.getElementById('adminToolbar');
                const accountManagerBtn = document.getElementById('accountManagerBtn');

                if (curUser) {
                    loginBtn.classList.add('hidden');
                    userInfo.classList.remove('hidden');
                    document.getElementById('currentUserName').innerText = curUser.username;
                    adminToolbar.classList.remove('hidden');
                    
                    if (curUser.role === 'admin') {
                        accountManagerBtn.classList.remove('hidden');
                        this.renderUsersTable();
                        this.renderCategoryManager();
                    } else {
                        accountManagerBtn.classList.add('hidden');
                    }
                } else {
                    loginBtn.classList.remove('hidden');
                    userInfo.classList.add('hidden');
                    adminToolbar.classList.add('hidden');
                    this.closeModal('settingsModal');
                }
                this.renderResources();
            },

            addNewAccountFromTable: async function() {
                if (!window.appState.fbUser || window.appState.currentUser?.role !== 'admin') return;
                const username = document.getElementById('newAccUsername').value.trim();
                const password = document.getElementById('newAccPassword').value.trim();
                const role = document.getElementById('newAccRole').value;

                if (!username || !password) { this.showToast("資料需填寫完整", "error"); return; }
                if (window.appState.users.some(u => u.username === username)) { this.showToast("帳號已存在", "error"); return; }
                
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', USERS_COLLECTION), {
                    username, password, role, createdAt: Date.now()
                });
                this.showToast("帳號已新增");
            },

            deleteAccount: async function(id) {
                if (!window.appState.fbUser || window.appState.currentUser?.role !== 'admin') return;
                if (id === window.appState.currentUser.id) { this.showToast("無法刪除自己", "error"); return; }
                
                if (window.confirm("確定要刪除此帳號嗎？")) {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', USERS_COLLECTION, id));
                    this.showToast("帳號已刪除");
                }
            },

            saveSystemName: async function() {
                if (!window.appState.fbUser || window.appState.currentUser?.role !== 'admin') return;
                const newName = document.getElementById('sysNameInput').value.trim();
                if (!newName) return;
                
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', SETTINGS_COLLECTION, 'global'), {
                    systemName: newName, updatedAt: Date.now()
                }, { merge: true });
                this.showToast("網站名稱已更新");
            },

            updateSystemNameUI: function() {
                const name = window.appState.systemName;
                document.getElementById('systemHeaderTitle').innerText = name;
                document.getElementById('systemPageTitle').innerText = `${name} - 雲端文庫`;
                document.getElementById('systemFooterTitle').innerHTML = `&copy; ${new Date().getFullYear()} ${name}. All rights reserved.`;
                const sysNameInput = document.getElementById('sysNameInput');
                if (sysNameInput) sysNameInput.value = name;
            },

            renderUsersTable: function() {
                const tbody = document.getElementById('userTableBody');
                if(!tbody) return;
                tbody.innerHTML = '';
                
                window.appState.users.forEach(u => {
                    const isCurrentUser = u.id === window.appState.currentUser?.id;
                    const tr = document.createElement('tr');
                    tr.className = 'border-b border-[#F4E6D9] hover:bg-gray-50';
                    tr.innerHTML = `
                        <td class="p-3 text-sm font-bold">${u.username}</td>
                        <td class="p-3 text-sm text-gray-400 font-mono">${u.password}</td>
                        <td class="p-3 text-sm">
                            <span class="bg-[#F4E6D9] text-[var(--text-main)] px-3 py-1 rounded-full text-xs font-bold">
                                ${u.role === 'admin' ? '管理員' : '協作者'}
                            </span>
                        </td>
                        <td class="p-3 text-sm text-center">
                            ${isCurrentUser 
                                ? `<span class="text-gray-400 text-xs font-bold">目前登入</span>`
                                : `<button onclick="app.deleteAccount('${u.id}')" class="text-gray-300 hover:text-[var(--color-red)] transition text-lg"><i class="fa-solid fa-circle-minus"></i></button>`
                            }
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

                const trNew = document.createElement('tr');
                trNew.innerHTML = `
                    <td class="p-2"><input type="text" id="newAccUsername" placeholder="新帳號" class="cute-input w-full px-3 py-1.5 text-sm"></td>
                    <td class="p-2"><input type="password" id="newAccPassword" placeholder="密碼" class="cute-input w-full px-3 py-1.5 text-sm"></td>
                    <td class="p-2">
                        <select id="newAccRole" class="cute-input w-full px-3 py-1.5 text-sm">
                            <option value="collaborator">協作者</option>
                            <option value="admin">管理員</option>
                        </select>
                    </td>
                    <td class="p-2 text-center">
                        <button onclick="app.addNewAccountFromTable()" class="bg-[var(--color-blue)] text-white px-4 py-1.5 rounded-full text-xs font-bold hover:brightness-105 transition">新增</button>
                    </td>
                `;
                tbody.appendChild(trNew);
            },

            seedDefaultCategories: async function() {
                const defaults = [
                    { name: '領導力', color: cuteColorPalette[0] }, // 紅
                    { name: '團隊', color: cuteColorPalette[2] },   // 綠
                    { name: '創新', color: cuteColorPalette[1] },   // 黃
                    { name: '多元', color: cuteColorPalette[3] },   // 藍
                    { name: '品質', color: cuteColorPalette[4] }    // 粉
                ];
                const colRef = collection(db, 'artifacts', appId, 'public', 'data', CATEGORIES_COLLECTION);
                for (const cat of defaults) await addDoc(colRef, cat);
            },

            saveManagedCategory: async function() {
                if (!window.appState.fbUser || window.appState.currentUser?.role !== 'admin') return;
                const input = document.getElementById('newCategoryInput');
                const name = input.value.trim();
                if (!name) return;
                if (window.appState.managedCategories.some(c => c.name === name)) { this.showToast("分類已存在", "error"); return; }
                
                const randomColor = cuteColorPalette[Math.floor(Math.random() * cuteColorPalette.length)];
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', CATEGORIES_COLLECTION), {
                    name, color: randomColor, createdAt: Date.now()
                });
                input.value = '';
                this.showToast("分類已建立");
            },

            deleteManagedCategory: async function(id) {
                if (!window.appState.fbUser || window.appState.currentUser?.role !== 'admin') return;
                if (window.confirm("確定要刪除此分類嗎？")) {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', CATEGORIES_COLLECTION, id));
                    this.showToast("分類已移除");
                }
            },
            
            renderCategoryManager: function() {
                const container = document.getElementById('categoryPillList');
                if (!container) return;
                container.innerHTML = '';
                window.appState.managedCategories.sort((a,b) => a.createdAt - b.createdAt).forEach(cat => {
                    const div = document.createElement('div');
                    div.className = `${cat.color} px-4 py-1.5 rounded-full flex items-center gap-2 text-sm font-bold shadow-sm`;
                    div.innerHTML = `
                        <span>${cat.name}</span>
                        <button onclick="app.deleteManagedCategory('${cat.id}')" class="opacity-60 hover:opacity-100 transition"><i class="fa-solid fa-times"></i></button>
                    `;
                    container.appendChild(div);
                });
            },

            extractCategories: function() {
                window.appState.categories = window.appState.managedCategories.map(c => c.name).sort();
                
                const filterSelect = document.getElementById('categoryFilter');
                const filterCurrentValue = filterSelect.value;
                filterSelect.innerHTML = '<option value="all">所有分類</option>';
                
                const resCategorySelect = document.getElementById('resCategory');
                let resCurrentValue = resCategorySelect ? resCategorySelect.value : '';
                if(resCategorySelect) resCategorySelect.innerHTML = '<option value="">請選擇...</option>';

                window.appState.categories.forEach(c => {
                    filterSelect.innerHTML += `<option value="${c}">${c}</option>`;
                    if(resCategorySelect) resCategorySelect.innerHTML += `<option value="${c}">${c}</option>`;
                });
                
                if (window.appState.categories.includes(filterCurrentValue)) filterSelect.value = filterCurrentValue;
                if (resCategorySelect && window.appState.categories.includes(resCurrentValue)) resCategorySelect.value = resCurrentValue;
            },

            handleSearch: function() {
                window.appState.searchQuery = document.getElementById('searchInput').value.toLowerCase();
                window.appState.currentPage = 1;
                this.renderResources();
            },

            handleFilter: function() {
                window.appState.filterType = document.getElementById('typeFilter').value;
                window.appState.filterCategory = document.getElementById('categoryFilter').value;
                window.appState.currentPage = 1;
                this.renderResources();
            },

            changePage: function(page) {
                window.appState.currentPage = page;
                this.renderResources();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            },

            renderResources: function() {
                const container = document.getElementById('resourceContainer');
                const pagination = document.getElementById('pagination');
                let filtered = window.appState.resources;

                if (window.appState.searchQuery) {
                    const q = window.appState.searchQuery;
                    filtered = filtered.filter(r => (r.title && r.title.toLowerCase().includes(q)) || (r.description && r.description.toLowerCase().includes(q)) || (r.category && r.category.toLowerCase().includes(q)));
                }
                if (window.appState.filterType !== 'all') filtered = filtered.filter(r => r.type === window.appState.filterType);
                if (window.appState.filterCategory !== 'all') filtered = filtered.filter(r => r.category === window.appState.filterCategory);

                filtered.sort((a, b) => b.createdAt - a.createdAt);

                const totalItems = filtered.length;
                const totalPages = Math.ceil(totalItems / window.appState.itemsPerPage) || 1;
                if (window.appState.currentPage > totalPages) window.appState.currentPage = totalPages;
                
                const startIndex = (window.appState.currentPage - 1) * window.appState.itemsPerPage;
                const paginated = filtered.slice(startIndex, startIndex + window.appState.itemsPerPage);

                container.innerHTML = '';
                
                if (paginated.length === 0) {
                    container.innerHTML = `
                        <div class="col-span-full py-20 text-center text-[var(--text-main)] opacity-50 bg-white rounded-3xl border-2 border-dashed border-[#E5D5C5]">
                            <i class="fa-solid fa-ghost text-5xl mb-4"></i>
                            <p class="font-bold text-lg">這裡空空的，沒有找到相關內容呢</p>
                        </div>
                    `;
                } else {
                    paginated.forEach(item => {
                        let iconClass = '';
                        let typeLabel = '';
                        if (item.type === 'document') {
                            iconClass = 'fa-file-alt text-[var(--color-blue)]';
                            typeLabel = '文件';
                        } else if (item.type === 'drive') {
                            iconClass = 'fa-google-drive fa-brands text-[var(--color-yellow)]';
                            typeLabel = '雲端硬碟';
                        } else {
                            iconClass = 'fa-link text-[var(--color-green)]';
                            typeLabel = '網站';
                        }
                        
                        // 取得分類顏色 (若無對應則用預設灰色)
                        const matchedCat = window.appState.managedCategories.find(c => c.name === item.category);
                        const catColorClass = matchedCat ? matchedCat.color : 'bg-gray-200 text-gray-600';

                        let canEdit = false;
                        if (window.appState.currentUser && (window.appState.currentUser.role === 'admin' || item.authorId === window.appState.currentUser.id)) canEdit = true;

                        const dateStr = new Date(item.createdAt).toLocaleDateString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit' });

                        const card = document.createElement('div');
                        card.className = "bg-white p-6 rounded-[1.5rem] border-2 border-[#F4E6D9] card-hover flex flex-col h-full";
                        
                        card.innerHTML = `
                            <div class="flex justify-between items-start mb-4">
                                <span class="${catColorClass} text-xs font-bold px-3 py-1 rounded-full">
                                    ${item.category || '未分類'}
                                </span>
                                <div class="flex items-center gap-2">
                                    <span class="text-xs text-gray-400 font-bold bg-gray-50 px-2 py-1 rounded-full"><i class="fa-regular fa-eye mr-1"></i>${item.views || 0}</span>
                                    <span class="text-xs text-gray-500 font-bold bg-[#FDF8F3] px-2 py-1 rounded-full border border-[#F4E6D9]"><i class="fa-solid ${iconClass} mr-1"></i>${typeLabel}</span>
                                </div>
                            </div>
                            
                            <h3 class="text-xl font-bold mb-2 text-[var(--text-main)] line-clamp-2 leading-snug rounded-font">
                                <a href="#" onclick="app.recordViewAndOpen('${item.id}', '${item.url}'); return false;" class="hover:text-[var(--color-red)] transition">
                                    ${item.title}
                                </a>
                            </h3>
                            
                            <p class="text-sm text-gray-600 mb-5 flex-grow line-clamp-3 leading-relaxed">
                                ${item.description || ''}
                            </p>
                            
                            <div class="mt-auto pt-4 border-t-2 border-dashed border-[#F4E6D9] flex justify-between items-center text-xs text-gray-400 font-bold">
                                <div>
                                    <i class="fa-solid fa-leaf mr-1"></i> ${dateStr} <br>
                                    <span class="mt-1.5 inline-block"><i class="fa-solid fa-pen-nib mr-1"></i> ${item.authorName}</span>
                                </div>
                                
                                ${canEdit ? `
                                    <div class="flex gap-2">
                                        <button onclick="app.editResource('${item.id}')" class="w-8 h-8 flex items-center justify-center bg-[var(--color-yellow)] text-[var(--text-main)] hover:brightness-105 rounded-full transition shadow-sm" title="編輯"><i class="fa-solid fa-pen text-[10px]"></i></button>
                                        <button onclick="app.deleteResource('${item.id}')" class="w-8 h-8 flex items-center justify-center bg-[var(--color-red)] text-white hover:brightness-105 rounded-full transition shadow-sm" title="刪除"><i class="fa-solid fa-trash text-[10px]"></i></button>
                                    </div>
                                ` : `
                                    <a href="#" onclick="app.recordViewAndOpen('${item.id}', '${item.url}'); return false;" class="text-[var(--text-main)] font-bold hover:bg-[var(--color-yellow)] bg-[#F4E6D9] px-4 py-2 rounded-full transition">
                                        前往 <i class="fa-solid fa-chevron-right ml-1 text-[10px]"></i>
                                    </a>
                                `}
                            </div>
                        `;
                        container.appendChild(card);
                    });
                }

                pagination.innerHTML = '';
                if (totalPages > 1) {
                    const btnClass = "w-9 h-9 flex items-center justify-center rounded-full border-2 font-bold transition";
                    const inactiveClass = "text-gray-300 border-gray-200 cursor-not-allowed";
                    const normalClass = "text-[var(--text-main)] border-[#F4E6D9] hover:bg-[#F4E6D9] bg-white";
                    const activeClass = "bg-[var(--color-green)] text-white border-[var(--color-green)]";

                    pagination.innerHTML += `<button onclick="app.changePage(${window.appState.currentPage - 1})" class="${btnClass} ${window.appState.currentPage === 1 ? inactiveClass : normalClass}" ${window.appState.currentPage === 1 ? 'disabled' : ''}><i class="fa-solid fa-chevron-left text-xs"></i></button>`;
                    
                    for (let i = 1; i <= totalPages; i++) {
                        if (i === 1 || i === totalPages || (i >= window.appState.currentPage - 1 && i <= window.appState.currentPage + 1)) {
                            pagination.innerHTML += `<button onclick="app.changePage(${i})" class="${btnClass} ${i === window.appState.currentPage ? activeClass : normalClass}">${i}</button>`;
                        } else if (i === window.appState.currentPage - 2 || i === window.appState.currentPage + 2) {
                            pagination.innerHTML += `<span class="px-1 text-gray-400">...</span>`;
                        }
                    }

                    pagination.innerHTML += `<button onclick="app.changePage(${window.appState.currentPage + 1})" class="${btnClass} ${window.appState.currentPage === totalPages ? inactiveClass : normalClass}" ${window.appState.currentPage === totalPages ? 'disabled' : ''}><i class="fa-solid fa-chevron-right text-xs"></i></button>`;
                }
            },

            saveResource: async function() {
                const curUser = window.appState.currentUser;
                if (!window.appState.fbUser || !curUser) return;

                const id = document.getElementById('resId').value;
                const type = document.querySelector('input[name="resType"]:checked').value;
                const title = document.getElementById('resTitle').value.trim();
                let url = document.getElementById('resUrl').value.trim();
                const category = document.getElementById('resCategory').value.trim();
                const description = document.getElementById('resDesc').value.trim();

                if (!title || !url || !category) { this.showToast("資料需填寫完整 (*)", "error"); return; }
                if (!/^https?:\/\//i.test(url)) url = 'https://' + url;

                const resData = { type, title, url, category, description, updatedAt: Date.now() };

                try {
                    if (id) {
                        const existing = window.appState.resources.find(r => r.id === id);
                        if (curUser.role !== 'admin' && existing.authorId !== curUser.id) { this.showToast("無權限修改", "error"); return; }
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', RESOURCES_COLLECTION, id), resData);
                        this.showToast("更新成功");
                    } else {
                        resData.authorId = curUser.id;
                        resData.authorName = curUser.username;
                        resData.createdAt = Date.now();
                        resData.views = 0;
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', RESOURCES_COLLECTION), resData);
                        this.showToast("建立成功");
                    }
                    this.closeModal('resourceModal');
                } catch(e) { this.showToast("儲存失敗", "error"); }
            },

            editResource: function(id) {
                const item = window.appState.resources.find(r => r.id === id);
                if(!item) return;

                document.getElementById('resId').value = item.id;
                document.querySelector(`input[name="resType"][value="${item.type}"]`).checked = true;
                document.getElementById('resTitle').value = item.title;
                document.getElementById('resUrl').value = item.url;
                document.getElementById('resCategory').value = item.category;
                document.getElementById('resDesc').value = item.description || '';
                
                document.getElementById('resourceModalTitle').innerText = '編輯內容';
                this.openModal('resourceModal');
            },

            deleteResource: async function(id) {
                const curUser = window.appState.currentUser;
                if (!curUser) return;
                const item = window.appState.resources.find(r => r.id === id);
                
                if (curUser.role !== 'admin' && item.authorId !== curUser.id) return;
                if (window.confirm(`確定要刪除「${item.title}」嗎？`)) {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', RESOURCES_COLLECTION, id));
                    this.showToast("已刪除");
                }
            },

            recordViewAndOpen: async function(id, url) {
                window.open(url, '_blank', 'noopener,noreferrer');
                if (window.appState.fbUser) {
                    const item = window.appState.resources.find(r => r.id === id);
                    if (item) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', RESOURCES_COLLECTION, id), { views: (item.views || 0) + 1 });
                }
            },

            openModal: function(modalId) {
                if (modalId === 'resourceModal' && !document.getElementById('resId').value) {
                    document.getElementById('resId').value = '';
                    document.getElementById('resTitle').value = '';
                    document.getElementById('resUrl').value = '';
                    document.getElementById('resCategory').value = '';
                    document.getElementById('resDesc').value = '';
                    document.getElementById('resourceModalTitle').innerText = '新增分享';
                }
                document.getElementById(modalId).classList.remove('hidden');
            },

            closeModal: function(modalId) {
                document.getElementById(modalId).classList.add('hidden');
            },

            showToast: function(msg, type = 'success') {
                const toast = document.getElementById('toast');
                const icon = document.getElementById('toastIcon');
                document.getElementById('toastMsg').innerText = msg;
                
                if (type === 'error') {
                    icon.className = 'fa-solid fa-face-frown text-[var(--color-red)] text-xl';
                } else {
                    icon.className = 'fa-solid fa-face-smile text-[var(--color-yellow)] text-xl';
                }

                toast.classList.remove('translate-y-20', 'opacity-0');
                setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
            }
        };

        window.addEventListener('DOMContentLoaded', () => window.app.init());
    </script>
</body>
</html>
