<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雲端文件管理系統</title>
    <!-- 引入思源黑體與日系明朝體 (Shippori Mincho) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Shippori+Mincho:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2b3a4a',    // 鐵紺 (Tetsukon / Navy)
                        'primary-hover': '#1a242f',
                        accent: '#b54454',     // 蘇芳 (Suou / Red)
                        'accent-hover': '#8e3541',
                        surface: '#f8f7f5',    // 和紙 (Washi White)
                        paper: '#ffffff',      // 純白
                        'zen-border': '#e2dfd8', // 枯淡 (Subtle Grey)
                        'ink': '#333631',      // 墨 (Ink Black)
                    },
                    fontFamily: {
                        sans: ['"Noto Sans TC"', 'sans-serif'],
                        serif: ['"Shippori Mincho"', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 極簡日式焦點框 */
        input:focus, select:focus {
            outline: none;
            border-color: #2b3a4a !important;
            box-shadow: 0 0 0 1px #2b3a4a !important;
        }

        /* 網底和紙點陣 (Subtle dot pattern) */
        .washi-pattern {
            background-color: #f8f7f5;
            background-image: radial-gradient(#d5d3ce 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>
<body class="washi-pattern text-ink font-sans antialiased selection:bg-primary selection:text-white">

    <!-- 1. 登入畫面 -->
    <div id="login-view" class="min-h-screen flex items-center justify-center p-4 hidden relative">
        <div class="bg-paper p-12 rounded-sm shadow-[0_10px_40px_-10px_rgba(0,0,0,0.08)] w-full max-w-md border border-zen-border relative">
            
            <div class="text-center mb-10 flex flex-col items-center">
                <!-- 日式家徽/印章 Logo -->
                <div class="mb-6 relative">
                    <div class="w-12 h-12 border border-ink flex items-center justify-center transform rotate-45">
                        <div class="w-10 h-10 border border-ink flex items-center justify-center transform -rotate-45 font-serif font-bold text-xl text-ink">庫</div>
                    </div>
                    <!-- 紅色判子 (Hanko) -->
                    <div class="absolute -bottom-2 -right-3 w-6 h-6 border-2 border-accent text-accent rounded-sm flex items-center justify-center font-serif text-[10px] font-bold transform rotate-12 bg-white opacity-90">
                        認
                    </div>
                </div>
                <h1 class="text-2xl font-serif font-bold text-ink tracking-widest mb-1">雲端文書庫</h1>
                <p class="text-slate-400 text-xs font-sans tracking-widest mt-1">共用文件管理系統</p>
            </div>
            
            <form id="login-form" class="space-y-6">
                <div>
                    <label class="block text-sm font-serif text-ink mb-2 tracking-wider">帳號</label>
                    <input type="text" id="username" class="w-full px-4 py-3.5 rounded-sm border border-zen-border bg-[#fdfcfb] transition-colors font-sans text-sm" placeholder="請輸入帳號" required>
                </div>
                <div>
                    <label class="block text-sm font-serif text-ink mb-2 tracking-wider">密碼</label>
                    <input type="password" id="password" class="w-full px-4 py-3.5 rounded-sm border border-zen-border bg-[#fdfcfb] transition-colors font-sans text-sm" placeholder="請輸入密碼" required>
                </div>
                <div id="login-error" class="text-accent text-sm hidden text-center font-serif bg-[#fdf2f3] py-2.5 border border-[#f3d8dc] rounded-sm">認證失敗，請重新確認</div>
                
                <button type="submit" class="w-full bg-primary hover:bg-primary-hover text-white font-serif tracking-widest py-4 rounded-sm transition-all duration-300 mt-2 flex items-center justify-center gap-2">
                    登入系統
                </button>
                <div class="text-center mt-6">
                    <button type="button" id="back-to-dash-btn" class="text-xs text-slate-400 hover:text-primary transition-colors font-sans tracking-widest border-b border-transparent hover:border-primary pb-0.5">
                        以訪客身分閱覽
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- 2. 系統主畫面 -->
    <div id="dashboard-view" class="min-h-screen flex flex-col hidden">
        <!-- 導覽列 -->
        <header class="bg-paper shadow-[0_2px_10px_rgba(0,0,0,0.02)] border-b border-zen-border sticky top-0 z-30">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between items-center h-[72px]">
                    <div class="flex items-center gap-4">
                        <div class="w-8 h-8 border border-primary text-primary flex items-center justify-center font-serif font-bold text-sm bg-surface">庫</div>
                        <h1 class="text-xl font-serif font-bold text-primary tracking-widest">雲端文書庫</h1>
                    </div>
                    <div class="flex items-center gap-6">
                        <div id="user-info" class="hidden flex items-center gap-6">
                            <span class="text-sm text-slate-500 hidden sm:block font-sans">
                                目前登入：<span id="current-user-display" class="font-bold text-ink"></span> 
                                <span class="text-slate-400 text-[10px] ml-1 border border-zen-border px-1.5 py-0.5 rounded-sm bg-surface tracking-wider" id="current-role-display"></span>
                            </span>
                            <div class="h-4 w-px bg-zen-border hidden sm:block"></div>
                            <button id="manage-users-btn" class="hidden text-sm text-ink hover:text-primary font-serif tracking-wider transition-colors">
                                系統設定
                            </button>
                            <button id="logout-btn" class="text-sm text-ink hover:text-accent font-serif tracking-wider transition-colors">
                                登出
                            </button>
                        </div>
                        <button id="login-btn" class="text-sm text-primary hover:text-white hover:bg-primary font-serif tracking-widest transition-all border border-primary px-5 py-2 rounded-sm">
                            管理員登入
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <!-- 主要內容區 -->
        <main class="flex-1 max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-10">
            <!-- 控制工具列 -->
            <div class="bg-paper p-5 rounded-sm shadow-sm border border-zen-border mb-6 flex flex-col md:flex-row gap-5 justify-between items-center">
                <div class="flex flex-col sm:flex-row gap-4 w-full md:w-auto">
                    <!-- 搜尋框 -->
                    <div class="relative w-full sm:w-72">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fas fa-search text-slate-300"></i>
                        </div>
                        <input type="text" id="search-input" class="pl-11 w-full px-4 py-2.5 rounded-sm border border-zen-border bg-surface text-sm transition-all font-sans placeholder:text-slate-400 focus:bg-white" placeholder="搜尋文件名稱或關鍵字...">
                    </div>
                    <!-- 分類下拉 -->
                    <div class="relative w-full sm:w-56">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fas fa-layer-group text-slate-300"></i>
                        </div>
                        <select id="category-filter" class="pl-11 w-full px-4 py-2.5 rounded-sm border border-zen-border bg-surface text-sm appearance-none transition-all cursor-pointer font-sans focus:bg-white">
                            <option value="全部">所有分類文件</option>
                        </select>
                        <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none">
                            <i class="fas fa-chevron-down text-slate-300 text-xs"></i>
                        </div>
                    </div>
                </div>
                <!-- 新增按鈕 -->
                <button id="add-doc-btn" class="hidden w-full md:w-auto bg-primary hover:bg-primary-hover text-white px-6 py-2.5 rounded-sm text-sm font-serif tracking-widest transition-all shadow-sm flex items-center justify-center gap-2">
                    <i class="fas fa-plus text-xs opacity-70"></i> 新增文件
                </button>
            </div>

            <!-- 資料表格 -->
            <div class="bg-paper rounded-sm shadow-sm border border-zen-border overflow-hidden">
                <div class="overflow-x-auto no-scrollbar">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-surface border-b border-zen-border text-ink font-serif text-sm">
                                <th class="px-6 py-4 font-semibold tracking-wider">文件名稱</th>
                                <th class="px-6 py-4 font-semibold tracking-wider w-32">分類</th>
                                <th class="px-6 py-4 font-semibold tracking-wider w-32">建立者</th>
                                <th class="px-6 py-4 font-semibold tracking-wider w-24 text-center">觀看次數</th>
                                <th class="px-6 py-4 font-semibold tracking-wider w-40">更新日期</th>
                                <th id="action-header" class="px-6 py-4 font-semibold tracking-wider w-28 text-center hidden">操作</th>
                            </tr>
                        </thead>
                        <tbody id="table-body" class="divide-y divide-zen-border">
                            <!-- 資料動態產生 -->
                        </tbody>
                    </table>
                </div>
                
                <!-- 空狀態提示 -->
                <div id="empty-state" class="hidden py-20 text-center bg-paper">
                    <div class="text-zen-border mb-4"><i class="fas fa-folder-open text-5xl"></i></div>
                    <p class="text-slate-500 font-serif text-lg tracking-widest mb-1">查無相符的文件</p>
                    <p class="text-slate-400 font-sans text-xs">請嘗試更換關鍵字或分類篩選</p>
                </div>

                <!-- 分頁控制 -->
                <div class="bg-surface px-6 py-4 border-t border-zen-border flex items-center justify-between">
                    <p class="text-xs text-slate-500 font-sans tracking-wide">
                        顯示第 <span id="page-start" class="font-bold text-ink">0</span> 至 <span id="page-end" class="font-bold text-ink">0</span> 筆，共 <span id="total-count" class="font-bold text-ink">0</span> 筆文件
                    </p>
                    <div class="flex gap-2">
                        <button id="prev-page" class="w-8 h-8 flex items-center justify-center border border-zen-border rounded-sm hover:border-primary hover:text-primary disabled:opacity-30 disabled:hover:border-zen-border disabled:cursor-not-allowed transition-all text-slate-500 bg-white shadow-sm">
                            <i class="fas fa-angle-left text-sm"></i>
                        </button>
                        <span id="page-info" class="px-4 h-8 flex items-center text-xs font-sans text-ink bg-white border border-zen-border rounded-sm shadow-sm">
                            1 / 1
                        </span>
                        <button id="next-page" class="w-8 h-8 flex items-center justify-center border border-zen-border rounded-sm hover:border-primary hover:text-primary disabled:opacity-30 disabled:hover:border-zen-border disabled:cursor-not-allowed transition-all text-slate-500 bg-white shadow-sm">
                            <i class="fas fa-angle-right text-sm"></i>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 3. 新增/編輯文件 Modal -->
    <div id="doc-modal" class="fixed inset-0 bg-ink/30 backdrop-blur-[2px] hidden z-50 flex items-center justify-center p-4">
        <div class="bg-paper rounded-sm shadow-2xl w-full max-w-lg border border-zen-border overflow-hidden transform transition-all">
            <div class="px-8 py-6 border-b border-zen-border flex justify-between items-center bg-surface relative">
                <h3 id="modal-title" class="text-lg font-serif font-bold text-ink tracking-widest">新增文件</h3>
                <button id="close-modal" class="text-slate-400 hover:text-primary transition-colors">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="doc-form" class="p-8 space-y-6">
                <input type="hidden" id="doc-id">
                <div>
                    <label class="block text-sm font-serif text-ink mb-2 tracking-wider">文件名稱 <span class="text-accent ml-1">*</span></label>
                    <input type="text" id="doc-title" required class="w-full px-4 py-3 rounded-sm border border-zen-border bg-surface focus:bg-white transition-colors text-ink font-sans text-sm">
                </div>
                <div>
                    <label class="block text-sm font-serif text-ink mb-2 tracking-wider">分類 <span class="text-accent ml-1">*</span></label>
                    <select id="doc-category" required class="w-full px-4 py-3 rounded-sm border border-zen-border bg-surface focus:bg-white transition-colors appearance-none cursor-pointer text-ink font-sans text-sm">
                        <!-- 選項動態產生 -->
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-serif text-ink mb-2 tracking-wider">存取連結 (URL) <span class="text-accent ml-1">*</span></label>
                    <input type="url" id="doc-link" required class="w-full px-4 py-3 rounded-sm border border-zen-border bg-surface focus:bg-white transition-colors text-ink font-sans text-sm" placeholder="https://...">
                </div>
                <div class="pt-6 flex justify-end gap-3 border-t border-zen-border mt-8">
                    <button type="button" id="cancel-modal" class="px-6 py-2.5 rounded-sm border border-zen-border text-slate-500 hover:text-ink font-serif tracking-widest transition-all bg-surface hover:bg-white">取消</button>
                    <button type="submit" class="px-6 py-2.5 rounded-sm bg-primary hover:bg-primary-hover text-white font-serif tracking-widest transition-all shadow-sm">
                        儲存文件
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- 4. 系統設定 (帳號與分類管理) Modal -->
    <div id="settings-modal" class="fixed inset-0 bg-ink/30 backdrop-blur-[2px] hidden z-50 flex items-center justify-center p-4">
        <div class="bg-paper rounded-sm shadow-2xl w-full max-w-3xl border border-zen-border overflow-hidden transform transition-all flex flex-col max-h-[90vh]">
            <div class="px-8 py-6 border-b border-zen-border flex justify-between items-center bg-surface relative">
                <h3 class="text-lg font-serif font-bold text-ink tracking-widest"><i class="fas fa-sliders-h text-primary mr-3 opacity-80"></i>系統設定</h3>
                <button id="close-settings-modal" class="text-slate-400 hover:text-primary transition-colors">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div class="p-8 overflow-y-auto flex-1 bg-paper">
                <!-- 帳號管理區塊 -->
                <div class="mb-12">
                    <h4 class="text-base font-serif font-bold text-ink mb-4 border-b border-zen-border pb-2 tracking-widest flex items-center"><span class="w-1.5 h-4 bg-primary mr-2"></span> 使用者管理</h4>
                    
                    <form id="user-form" class="mb-6 flex flex-wrap gap-4 items-end bg-surface p-5 border border-zen-border rounded-sm">
                        <div class="flex-1 min-w-[150px]">
                            <label class="block text-xs font-sans text-slate-500 mb-1.5 tracking-wider">帳號</label>
                            <input type="text" id="new-username" required class="w-full px-3 py-2.5 rounded-sm border border-zen-border bg-white text-sm font-sans focus:bg-surface transition-colors">
                        </div>
                        <div class="flex-1 min-w-[150px]">
                            <label class="block text-xs font-sans text-slate-500 mb-1.5 tracking-wider">密碼</label>
                            <input type="text" id="new-password" required class="w-full px-3 py-2.5 rounded-sm border border-zen-border bg-white text-sm font-sans focus:bg-surface transition-colors">
                        </div>
                        <div class="w-36">
                            <label class="block text-xs font-sans text-slate-500 mb-1.5 tracking-wider">權限</label>
                            <select id="new-role" class="w-full px-3 py-2.5 rounded-sm border border-zen-border bg-white text-sm font-sans focus:bg-surface transition-colors appearance-none">
                                <option value="collaborator">協作者 (一般)</option>
                                <option value="admin">管理員</option>
                            </select>
                        </div>
                        <button type="submit" class="bg-primary hover:bg-primary-hover text-white px-6 py-2.5 rounded-sm text-sm font-serif tracking-widest transition-colors shadow-sm h-[42px]">
                            新增
                        </button>
                    </form>

                    <div class="border border-zen-border rounded-sm overflow-hidden bg-white">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-surface text-ink font-sans text-xs border-b border-zen-border">
                                <tr>
                                    <th class="px-5 py-3 font-semibold tracking-wider">帳號</th>
                                    <th class="px-5 py-3 font-semibold tracking-wider">密碼</th>
                                    <th class="px-5 py-3 font-semibold tracking-wider">權限</th>
                                    <th class="px-5 py-3 font-semibold text-center w-24 tracking-wider">刪除</th>
                                </tr>
                            </thead>
                            <tbody id="users-table-body" class="divide-y divide-zen-border text-sm">
                                <!-- JS 動態產生 -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- 分類管理區塊 -->
                <div>
                    <h4 class="text-base font-serif font-bold text-ink mb-4 border-b border-zen-border pb-2 tracking-widest flex items-center"><span class="w-1.5 h-4 bg-primary mr-2"></span> 分類管理</h4>
                    
                    <form id="category-form" class="mb-5 flex flex-wrap gap-4 items-end">
                        <div class="flex-1">
                            <label class="block text-xs font-sans text-slate-500 mb-1.5 tracking-wider">新增分類名稱</label>
                            <input type="text" id="new-category-name" required placeholder="例如：企劃書" class="w-full px-4 py-2.5 rounded-sm border border-zen-border bg-surface text-sm font-sans focus:bg-white transition-colors">
                        </div>
                        <button type="submit" class="bg-surface border border-zen-border hover:border-primary text-ink hover:text-primary px-6 py-2.5 rounded-sm text-sm font-serif tracking-widest transition-colors h-[42px] whitespace-nowrap">
                            新增分類
                        </button>
                    </form>
                    
                    <div class="bg-surface border border-zen-border rounded-sm p-6 mt-4">
                        <p class="text-xs font-sans text-slate-400 mb-4 tracking-wider">目前的分類清單：</p>
                        <div id="category-list" class="flex flex-wrap gap-3">
                            <!-- JS 動態產生 -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 5. 系統提示/確認對話框 Modal -->
    <div id="dialog-modal" class="fixed inset-0 bg-ink/40 backdrop-blur-[2px] hidden z-[80] flex items-center justify-center p-4">
        <div class="bg-paper rounded-sm shadow-2xl w-full max-w-sm border border-zen-border overflow-hidden transform transition-all text-center p-10">
            <!-- 紅色判子風格的警告圖示 -->
            <div id="dialog-icon-container" class="w-14 h-14 border-2 rounded-sm flex items-center justify-center mx-auto mb-6 bg-white transform rotate-3">
                <i id="dialog-icon" class="fas fa-exclamation-triangle text-xl"></i>
            </div>
            <h3 id="dialog-title" class="text-lg font-serif font-bold text-ink mb-3 tracking-widest">系統提示</h3>
            <p id="dialog-message" class="text-slate-600 text-sm mb-8 leading-relaxed font-sans">訊息內容</p>
            <div class="flex justify-center gap-3">
                <button id="dialog-cancel-btn" class="px-6 py-2.5 rounded-sm border border-zen-border text-slate-500 hover:text-ink font-serif tracking-widest transition-colors w-full hidden bg-surface hover:bg-white">取消</button>
                <button id="dialog-confirm-btn" class="px-6 py-2.5 rounded-sm text-white font-serif tracking-widest transition-colors w-full shadow-sm">確定</button>
            </div>
        </div>
    </div>

    <!-- 6. 載入中遮罩 -->
    <div id="loading-overlay" class="fixed inset-0 bg-paper/90 backdrop-blur-sm hidden z-[90] flex flex-col items-center justify-center">
        <!-- 和風花草旋轉 loading -->
        <i class="fas fa-fan fa-spin text-4xl text-primary mb-6 opacity-80"></i>
        <p class="text-ink font-serif tracking-widest font-bold text-sm" id="loading-text">資料同步中...</p>
    </div>

    <!-- 7. Javascript 邏輯區 -->
    <script>
        const CONFIG = {
            USE_GOOGLE_SHEETS: false, 
            GAS_URL: 'https://script.google.com/macros/s/AKfycbzx8VFrA_8KTGwFtujlLIPjMMEPn33sIV3Llgmd8gOhEy7LT6VqvipC1ziVWMWLCxCU-g/exec',
            ITEMS_PER_PAGE: 10
        };

        let state = {
            documents: [],
            filteredDocs: [],
            users: [],
            categories: [],
            currentPage: 1,
            searchQuery: '',
            categoryFilter: '全部',
            isLoading: false
        };

        const defaultUsers = [
            { id: 'u_admin', username: 'admin', password: '123', role: 'admin' }
        ];

        const defaultCategories = ['總務', '財務', '企劃', '技術', '其他'];
        const defaultData = [];

        // 日式傳統色標籤 (Nippon Colors)
        const colorClasses = [
            'bg-[#f7ecee] text-[#b54454] border border-[#e8d3d7]', // 櫻 Sakura / 蘇芳
            'bg-[#e9eee6] text-[#4f664b] border border-[#d2dcd0]', // 抹茶 Matcha / 松葉
            'bg-[#e6ebf0] text-[#2b3a4a] border border-[#caced6]', // 空 Sora / 鐵紺
            'bg-[#f0eaf4] text-[#6b4c8a] border border-[#d9ccdf]', // 藤 Fuji
            'bg-[#f3eedb] text-[#8a7238] border border-[#e0d6b8]', // 芥子 Karashi
            'bg-[#eae8e6] text-[#55585b] border border-[#cfccca]'  // 鈍色 Nibiiro
        ];

        const getColorClass = (str) => {
            if (!str) return 'bg-[#f8f7f5] text-slate-500 border border-zen-border';
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = str.charCodeAt(i) + ((hash << 5) - hash);
            }
            return colorClasses[Math.abs(hash) % colorClasses.length];
        };

        const getIconInfo = (url) => {
            try {
                const urlObj = new URL(url);
                const hostname = urlObj.hostname.toLowerCase();

                if (hostname.includes('youtube.com') || hostname.includes('youtu.be')) {
                    return { class: 'fab fa-youtube', color: 'text-[#b54454]', hover: 'group-hover:text-red-800' };
                }
                if (hostname.includes('drive.google.com') || hostname.includes('docs.google.com')) {
                    return { class: 'fab fa-google-drive', color: 'text-[#2b3a4a]', hover: 'group-hover:text-ink' };
                }
                if (hostname.includes('github.com')) {
                    return { class: 'fab fa-github', color: 'text-[#333631]', hover: 'group-hover:text-black' };
                }
                if (hostname.includes('dropbox.com')) {
                    return { class: 'fab fa-dropbox', color: 'text-[#4f664b]', hover: 'group-hover:text-black' };
                }
                if (hostname.includes('figma.com')) {
                    return { class: 'fab fa-figma', color: 'text-[#b54454]', hover: 'group-hover:text-[#8e3541]' };
                }
                if (hostname.includes('trello.com')) {
                    return { class: 'fab fa-trello', color: 'text-[#2b3a4a]', hover: 'group-hover:text-[#1a242f]' };
                }
                if (hostname.includes('notion.so') || hostname.includes('notion.site')) {
                    return { class: 'fas fa-cube', color: 'text-ink', hover: 'group-hover:text-black' };
                }
                
                return { class: 'fas fa-link', color: 'text-slate-400', hover: 'group-hover:text-primary' };
            } catch (e) {
                return { class: 'fas fa-file-alt', color: 'text-slate-400', hover: 'group-hover:text-primary' };
            }
        };

        const Dialog = {
            show(title, message, isConfirm = false) {
                return new Promise((resolve) => {
                    const modal = document.getElementById('dialog-modal');
                    const titleEl = document.getElementById('dialog-title');
                    const msgEl = document.getElementById('dialog-message');
                    const cancelBtn = document.getElementById('dialog-cancel-btn');
                    const confirmBtn = document.getElementById('dialog-confirm-btn');
                    const iconContainer = document.getElementById('dialog-icon-container');
                    const icon = document.getElementById('dialog-icon');

                    titleEl.textContent = title;
                    msgEl.textContent = message;

                    if (isConfirm) {
                        cancelBtn.classList.remove('hidden');
                        confirmBtn.className = 'px-6 py-2.5 rounded-sm bg-accent hover:bg-accent-hover text-white font-serif tracking-widest transition-colors w-full shadow-sm';
                        iconContainer.className = 'w-14 h-14 border-2 border-[#e8d3d7] text-accent rounded-sm flex items-center justify-center mx-auto mb-6 bg-[#fcf5f6] transform rotate-3';
                        icon.className = 'fas fa-exclamation-triangle text-xl text-accent';
                    } else {
                        cancelBtn.classList.add('hidden');
                        confirmBtn.className = 'px-6 py-2.5 rounded-sm bg-primary hover:bg-primary-hover text-white font-serif tracking-widest transition-colors w-full shadow-sm';
                        iconContainer.className = 'w-14 h-14 border-2 border-zen-border text-primary rounded-sm flex items-center justify-center mx-auto mb-6 bg-surface';
                        icon.className = 'fas fa-info text-xl text-primary';
                    }

                    modal.classList.remove('hidden');

                    const cleanUp = () => {
                        modal.classList.add('hidden');
                        cancelBtn.removeEventListener('click', onCancel);
                        confirmBtn.removeEventListener('click', onConfirm);
                    };

                    const onCancel = () => { cleanUp(); resolve(false); };
                    const onConfirm = () => { cleanUp(); resolve(true); };

                    cancelBtn.addEventListener('click', onCancel);
                    confirmBtn.addEventListener('click', onConfirm);
                });
            },
            alert(message) { return this.show('系統提示', message, false); },
            confirm(message) { return this.show('請確認', message, true); }
        };

        const DB = {
            async fetchAll() {
                showLoading('讀取資料中...');
                try {
                    if (CONFIG.USE_GOOGLE_SHEETS) {
                        const response = await fetch(`${CONFIG.GAS_URL}?action=read`);
                        const data = await response.json();
                        if(data.success) {
                            state.documents = data.documents || [];
                            state.users = data.users || [];
                            state.categories = data.categories || [];
                        }
                    } else {
                        await new Promise(r => setTimeout(r, 600));
                        
                        let localUsers = JSON.parse(localStorage.getItem('cloud_users'));
                        if (!localUsers || localUsers.length === 0) localUsers = defaultUsers;
                        state.users = localUsers;

                        let localCats = JSON.parse(localStorage.getItem('cloud_categories'));
                        if (!localCats || localCats.length === 0) localCats = defaultCategories;
                        state.categories = localCats;

                        let localDocs = JSON.parse(localStorage.getItem('cloud_docs'));
                        if (!localDocs) localDocs = defaultData;
                        state.documents = localDocs;
                        
                        localStorage.setItem('cloud_users', JSON.stringify(state.users));
                        localStorage.setItem('cloud_categories', JSON.stringify(state.categories));
                        localStorage.setItem('cloud_docs', JSON.stringify(state.documents));
                    }
                } catch (error) {
                    await Dialog.alert('讀取失敗，請確認網路連線。');
                    console.error(error);
                } finally {
                    hideLoading();
                }
            },

            async save(docData) {
                showLoading('儲存中...');
                try {
                    if (CONFIG.USE_GOOGLE_SHEETS) {
                        const action = docData.id ? 'updateDoc' : 'createDoc';
                        await fetch(CONFIG.GAS_URL, { method: 'POST', body: JSON.stringify({ action: action, data: docData }) });
                        await this.fetchAll();
                    } else {
                        await new Promise(r => setTimeout(r, 400));
                        if (docData.id) {
                            const index = state.documents.findIndex(d => d.id === docData.id);
                            if (index > -1) state.documents[index] = { ...state.documents[index], ...docData, timestamp: Date.now(), date: new Date().toISOString().split('T')[0] };
                        } else {
                            docData.id = 'doc_' + Date.now();
                            docData.timestamp = Date.now();
                            docData.date = new Date().toISOString().split('T')[0];
                            docData.views = 0;
                            state.documents.push(docData);
                        }
                        localStorage.setItem('cloud_docs', JSON.stringify(state.documents));
                    }
                } finally {
                    hideLoading();
                }
            },

            async delete(id) {
                if (!(await Dialog.confirm('確定要刪除這份文件嗎？\n※此動作無法復原。'))) return false;
                showLoading('刪除中...');
                try {
                    if (CONFIG.USE_GOOGLE_SHEETS) {
                        await fetch(CONFIG.GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'deleteDoc', id: id }) });
                        await this.fetchAll();
                    } else {
                        await new Promise(r => setTimeout(r, 400));
                        state.documents = state.documents.filter(d => d.id !== id);
                        localStorage.setItem('cloud_docs', JSON.stringify(state.documents));
                    }
                    return true;
                } finally {
                    hideLoading();
                }
            },

            async incrementView(id) {
                if (CONFIG.USE_GOOGLE_SHEETS) {
                    fetch(CONFIG.GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'incrementView', id: id }) })
                        .catch(err => console.error("Update failed", err));
                } else {
                    const index = state.documents.findIndex(d => d.id === id);
                    if (index > -1) {
                        state.documents[index].views = (Number(state.documents[index].views) || 0) + 1;
                        localStorage.setItem('cloud_docs', JSON.stringify(state.documents));
                    }
                }
            },

            async saveUser(userData) {
                if (CONFIG.USE_GOOGLE_SHEETS) {
                    showLoading('處理中...');
                    await fetch(CONFIG.GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'createUser', data: userData }) });
                    await this.fetchAll();
                    hideLoading();
                } else {
                    userData.id = 'u_' + Date.now();
                    state.users.push(userData);
                    localStorage.setItem('cloud_users', JSON.stringify(state.users));
                }
            },

            async deleteUser(id) {
                if (CONFIG.USE_GOOGLE_SHEETS) {
                    showLoading('處理中...');
                    await fetch(CONFIG.GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'deleteUser', id: id }) });
                    await this.fetchAll();
                    hideLoading();
                } else {
                    state.users = state.users.filter(u => u.id !== id);
                    localStorage.setItem('cloud_users', JSON.stringify(state.users));
                }
            },

            async saveCategory(name) {
                if (!state.categories.includes(name)) {
                    if (CONFIG.USE_GOOGLE_SHEETS) {
                        showLoading('處理中...');
                        await fetch(CONFIG.GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'createCategory', name: name }) });
                        await this.fetchAll();
                        hideLoading();
                    } else {
                        state.categories.push(name);
                        localStorage.setItem('cloud_categories', JSON.stringify(state.categories));
                    }
                }
            },

            async deleteCategory(name) {
                if (CONFIG.USE_GOOGLE_SHEETS) {
                    showLoading('處理中...');
                    await fetch(CONFIG.GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'deleteCategory', name: name }) });
                    await this.fetchAll();
                    hideLoading();
                } else {
                    state.categories = state.categories.filter(c => c !== name);
                    localStorage.setItem('cloud_categories', JSON.stringify(state.categories));
                }
            }
        };

        const els = {
            loginView: document.getElementById('login-view'),
            dashboardView: document.getElementById('dashboard-view'),
            loginForm: document.getElementById('login-form'),
            loginError: document.getElementById('login-error'),
            backToDashBtn: document.getElementById('back-to-dash-btn'),
            loginBtn: document.getElementById('login-btn'),
            logoutBtn: document.getElementById('logout-btn'),
            manageUsersBtn: document.getElementById('manage-users-btn'),
            userInfo: document.getElementById('user-info'),
            searchInput: document.getElementById('search-input'),
            categoryFilter: document.getElementById('category-filter'),
            tableBody: document.getElementById('table-body'),
            emptyState: document.getElementById('empty-state'),
            prevBtn: document.getElementById('prev-page'),
            nextBtn: document.getElementById('next-page'),
            pageInfo: document.getElementById('page-info'),
            pageStart: document.getElementById('page-start'),
            pageEnd: document.getElementById('page-end'),
            totalCount: document.getElementById('total-count'),
            addBtn: document.getElementById('add-doc-btn'),

        function init() {
            showDashboard();
            checkLoginStatus();
            bindEvents();
        }

        function checkLoginStatus() {
            const userStr = sessionStorage.getItem('logged_user');
            if (userStr) {
                const user = JSON.parse(userStr);
                document.getElementById('current-user-display').textContent = user.username;
                document.getElementById('current-role-display').textContent = user.role === 'admin' ? '管理員' : '一般';
                
                els.userInfo.classList.remove('hidden');
                els.loginBtn.classList.add('hidden');
                els.addBtn.classList.remove('hidden');
                els.actionHeader.classList.remove('hidden');
                
                if(user.role === 'admin') {
                    els.manageUsersBtn.classList.remove('hidden');
                } else {
                    els.manageUsersBtn.classList.add('hidden');
                }
            } else {
                els.userInfo.classList.add('hidden');
                els.loginBtn.classList.remove('hidden');
                els.addBtn.classList.add('hidden');
                els.actionHeader.classList.add('hidden');
                els.manageUsersBtn.classList.add('hidden');
            }
        }

        function showLogin() {
            els.loginView.classList.remove('hidden');
            els.dashboardView.classList.add('hidden');
        }

        async function showDashboard() {
            els.loginView.classList.add('hidden');
            els.dashboardView.classList.remove('hidden');
            if(state.documents.length === 0) {
                await DB.fetchAll();
            }
            renderCategoryOptions();
            applyFiltersAndRender();
        }

        function renderCategoryOptions() {
            const currentFilter = els.categoryFilter.value;
            const currentDocCat = els.docCategory.value;

            els.categoryFilter.innerHTML = '<option value="全部">所有分類文件</option>';
            els.docCategory.innerHTML = '';

            state.categories.forEach(cat => {
                els.categoryFilter.innerHTML += `<option value="${cat}">${cat}</option>`;
                els.docCategory.innerHTML += `<option value="${cat}">${cat}</option>`;
            });

            if (state.categories.includes(currentFilter) || currentFilter === '全部') els.categoryFilter.value = currentFilter;
            if (state.categories.includes(currentDocCat)) els.docCategory.value = currentDocCat;
        }

        function applyFiltersAndRender() {
            let filtered = state.documents.filter(doc => {
                const matchCategory = state.categoryFilter === '全部' || doc.category === state.categoryFilter;
                const matchSearch = doc.title.toLowerCase().includes(state.searchQuery.toLowerCase()) || 
                                    doc.category.includes(state.searchQuery);
                return matchCategory && matchSearch;
            });

            filtered.sort((a, b) => {
                const dateA = new Date(a.date).getTime();
                const dateB = new Date(b.date).getTime();
                if (dateA === dateB) {
                    return (Number(b.timestamp) || 0) - (Number(a.timestamp) || 0);
                }
                return dateB - dateA;
            });
            state.filteredDocs = filtered;

            const totalItems = filtered.length;
            const totalPages = Math.ceil(totalItems / CONFIG.ITEMS_PER_PAGE) || 1;
            
            if (state.currentPage > totalPages) state.currentPage = totalPages;
            if (state.currentPage < 1) state.currentPage = 1;

            const startIndex = (state.currentPage - 1) * CONFIG.ITEMS_PER_PAGE;
            const endIndex = Math.min(startIndex + CONFIG.ITEMS_PER_PAGE, totalItems);
            const currentDocs = filtered.slice(startIndex, endIndex);

            renderTable(currentDocs);
            renderPagination(startIndex + 1, endIndex, totalItems, totalPages);
        }

        window.openDocument = (id, link) => {
            window.open(link, '_blank');
            const doc = state.documents.find(d => d.id === id);
            if (doc) {
                doc.views = (Number(doc.views) || 0) + 1;
                applyFiltersAndRender();
            }
            DB.incrementView(id);
        };

        function renderTable(docs) {
            els.tableBody.innerHTML = '';
            
            if (docs.length === 0) {
                els.tableBody.parentElement.classList.add('hidden');
                els.emptyState.classList.remove('hidden');
                return;
            }

            els.tableBody.parentElement.classList.remove('hidden');
            els.emptyState.classList.add('hidden');

            const userStr = sessionStorage.getItem('logged_user');
            const currentUser = userStr ? JSON.parse(userStr) : null;

            docs.forEach(doc => {
                const colorClass = getColorClass(doc.category);
                const iconInfo = getIconInfo(doc.link);
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-surface transition-colors group';
                
                let actionHtml = '';
                if (currentUser) {
                    const isOwner = doc.author === currentUser.username;
                    const isAdmin = currentUser.role === 'admin';
                    
                    if (isAdmin || isOwner) {
                        actionHtml = `
                        <td class="px-6 py-4 text-center">
                            <div class="flex items-center justify-center gap-4">
                                <button onclick="editDocument('${doc.id}')" class="text-slate-300 hover:text-primary transition-colors" title="編輯">
                                    <i class="fas fa-pen text-sm"></i>
                                </button>
                                <button onclick="deleteDocument('${doc.id}')" class="text-slate-300 hover:text-accent transition-colors" title="刪除">
                                    <i class="fas fa-trash text-sm"></i>
                                </button>
                            </div>
                        </td>`;
                    } else {
                        actionHtml = `<td class="px-6 py-4 text-center text-slate-300 text-xs font-sans tracking-widest">—</td>`;
                    }
                }

                const viewsCount = Number(doc.views) || 0;

                tr.innerHTML = `
                    <td class="px-6 py-4">
                        <a href="#" onclick="openDocument('${doc.id}', '${doc.link}'); return false;" class="flex items-center gap-3 group-hover:text-primary transition-colors">
                            <i class="${iconInfo.class} ${iconInfo.color} ${iconInfo.hover} text-lg w-5 text-center transition-colors"></i>
                            <span class="font-bold text-ink group-hover:text-primary truncate max-w-xs md:max-w-md font-sans text-[15px]" title="${doc.title}">${doc.title}</span>
                        </a>
                    </td>
                    <td class="px-6 py-4">
                        <span class="inline-flex items-center px-2 py-0.5 rounded-sm text-[12px] font-bold ${colorClass} tracking-widest font-sans">
                            ${doc.category}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-sm text-slate-500 font-sans">
                        <i class="fas fa-user-circle mr-1.5 opacity-50"></i>${doc.author || '未知'}
                    </td>
                    <td class="px-6 py-4 text-sm text-slate-500 text-center font-sans">
                        ${viewsCount > 0 ? `<span class="text-primary bg-surface border border-zen-border px-2 py-0.5 rounded-sm font-bold text-xs">${viewsCount}</span>` : `<span class="text-slate-300 text-xs">—</span>`}
                    </td>
                    <td class="px-6 py-4 text-[13px] text-slate-400 font-sans tracking-wider">
                        ${doc.date.replace(/-/g, '/')}
                    </td>
                    ${actionHtml}
                `;
                els.tableBody.appendChild(tr);
            });
        }

        function renderPagination(start, end, total, totalPages) {
            els.pageStart.textContent = total === 0 ? 0 : start;
            els.pageEnd.textContent = end;
            els.totalCount.textContent = total;
            els.pageInfo.textContent = `${state.currentPage} / ${totalPages}`;
            els.prevBtn.disabled = state.currentPage <= 1;
            els.nextBtn.disabled = state.currentPage >= totalPages;
        }

        function bindEvents() {
            els.loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                if(state.users.length === 0) await DB.fetchAll();
                
                const u = document.getElementById('username').value.trim();
                const p = document.getElementById('password').value.trim();
                let validUser = state.users.find(user => user.username === u && user.password === p);
                
                // 強制備用登入機制 (防呆)
                if (!validUser && u === 'admin' && p === '123') {
                    validUser = { username: 'admin', role: 'admin' };
                    if (!CONFIG.USE_GOOGLE_SHEETS) {
                        state.users = defaultUsers;
                        localStorage.setItem('cloud_users', JSON.stringify(state.users));
                    }
                }

                if (validUser) { 
                    sessionStorage.setItem('logged_user', JSON.stringify({ username: validUser.username, role: validUser.role }));
                    els.loginError.classList.add('hidden');
                    els.loginForm.reset();
                    checkLoginStatus();
                    showDashboard();
                } else {
                    els.loginError.classList.remove('hidden');
                }
            });

            els.loginBtn.addEventListener('click', showLogin);
            els.backToDashBtn.addEventListener('click', () => {
                els.loginForm.reset();
                els.loginError.classList.add('hidden');
                showDashboard();
            });

            els.logoutBtn.addEventListener('click', () => {
                sessionStorage.removeItem('logged_user');
                checkLoginStatus();
                applyFiltersAndRender();
            });

            els.searchInput.addEventListener('input', (e) => {
                state.searchQuery = e.target.value;
                state.currentPage = 1;
                applyFiltersAndRender();
            });

            els.categoryFilter.addEventListener('change', (e) => {
                state.categoryFilter = e.target.value;
                state.currentPage = 1;
                applyFiltersAndRender();
            });

            els.prevBtn.addEventListener('click', () => {
                if (state.currentPage > 1) {
                    state.currentPage--;
                    applyFiltersAndRender();
                }
            });

            els.nextBtn.addEventListener('click', () => {
                const totalPages = Math.ceil(state.filteredDocs.length / CONFIG.ITEMS_PER_PAGE);
                if (state.currentPage < totalPages) {
                    state.currentPage++;
                    applyFiltersAndRender();
                }
            });

            els.addBtn.addEventListener('click', () => openModal());
            els.closeModalBtn.addEventListener('click', closeModal);
            els.cancelModalBtn.addEventListener('click', closeModal);

            els.docForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const currentUser = JSON.parse(sessionStorage.getItem('logged_user'));
                const docId = document.getElementById('doc-id').value;
                let originalDoc = docId ? state.documents.find(d => d.id === docId) : null;

                const docData = {
                    id: docId,
                    title: document.getElementById('doc-title').value,
                    category: document.getElementById('doc-category').value,
                    link: document.getElementById('doc-link').value,
                    author: originalDoc ? originalDoc.author : currentUser.username
                };
                
                await DB.save(docData);
                closeModal();
                applyFiltersAndRender();
            });

            els.manageUsersBtn.addEventListener('click', () => {
                renderSettingsData();
                els.settingsModal.classList.remove('hidden');
            });
            
            els.closeSettingsModalBtn.addEventListener('click', () => {
                els.settingsModal.classList.add('hidden');
            });

            els.userForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const u = document.getElementById('new-username').value;
                const p = document.getElementById('new-password').value;
                const r = document.getElementById('new-role').value;
                
                if(state.users.some(user => user.username === u)) {
                    await Dialog.alert('此帳號已存在！');
                    return;
                }
                
                await DB.saveUser({ username: u, password: p, role: r });
                els.userForm.reset();
                renderSettingsData();
            });

            els.categoryForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const name = document.getElementById('new-category-name').value.trim();
                
                if(state.categories.includes(name)) {
                    await Dialog.alert('此分類已存在！');
                    return;
                }
                
                await DB.saveCategory(name);
                els.categoryForm.reset();
                renderSettingsData();
                renderCategoryOptions();
            });
        }

        function renderSettingsData() {
            els.usersTableBody.innerHTML = '';
            const currentUser = JSON.parse(sessionStorage.getItem('logged_user'));

            state.users.forEach(user => {
                const isSelf = user.username === currentUser.username;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="px-5 py-3 font-bold text-ink">${user.username}</td>
                    <td class="px-5 py-3 text-slate-400 font-sans text-xs">${user.password}</td>
                    <td class="px-5 py-3">
                        <span class="inline-flex items-center px-2 py-0.5 border border-zen-border rounded-sm text-xs font-sans tracking-widest ${user.role === 'admin' ? 'bg-surface text-primary font-bold' : 'bg-transparent text-slate-500'}">
                            ${user.role === 'admin' ? '管理員' : '一般'}
                        </span>
                    </td>
                    <td class="px-5 py-3 text-center">
                        ${isSelf ? '<span class="text-xs text-primary bg-surface px-2 py-1 rounded-sm font-sans tracking-widest">目前登入</span>' : 
                        `<button onclick="deleteSystemUser('${user.id}')" class="text-slate-300 hover:text-accent transition-colors" title="刪除">
                            <i class="fas fa-trash text-sm"></i>
                        </button>`}
                    </td>
                `;
                els.usersTableBody.appendChild(tr);
            });

            els.categoryList.innerHTML = '';
            state.categories.forEach(cat => {
                const colorClass = getColorClass(cat);
                els.categoryList.innerHTML += `
                    <div class="flex items-center gap-2 ${colorClass} px-3 py-1.5 rounded-sm text-[13px] font-sans shadow-sm transition-transform hover:-translate-y-0.5">
                        <span class="tracking-widest font-bold">${cat}</span>
                        <button onclick="deleteSystemCategory('${cat}')" class="opacity-50 hover:opacity-100 hover:text-accent transition-all ml-1.5">
                            <i class="fas fa-times text-[10px]"></i>
                        </button>
                    </div>
                `;
            });
        }

        window.deleteSystemUser = async (id) => {
            if(await Dialog.confirm('確定要刪除此帳號嗎？')) {
                await DB.deleteUser(id);
                renderSettingsData();
            }
        };

        window.deleteSystemCategory = async (name) => {
            if(await Dialog.confirm(`確定要刪除分類「${name}」嗎？\n(注意：已標記此分類的文件不會被刪除，但下拉選單中將不再顯示此分類)`)) {
                await DB.deleteCategory(name);
                renderSettingsData();
                renderCategoryOptions();
                if (state.categoryFilter === name) {
                    state.categoryFilter = '全部';
                    applyFiltersAndRender();
                }
            }
        };

        function openModal(doc = null) {
            els.docForm.reset();
            if (doc) {
                els.modalTitle.innerHTML = '編輯文件';
                document.getElementById('doc-id').value = doc.id;
                document.getElementById('doc-title').value = doc.title;
                document.getElementById('doc-category').value = doc.category;
                document.getElementById('doc-link').value = doc.link;
            } else {
                els.modalTitle.innerHTML = '新增文件';
                document.getElementById('doc-id').value = '';
                if(state.categories.length > 0) els.docCategory.value = state.categories[0];
            }
            els.modal.classList.remove('hidden');
        }

        function closeModal() {
            els.modal.classList.add('hidden');
        }

        window.editDocument = (id) => {
            const doc = state.documents.find(d => d.id === id);
            if (doc) openModal(doc);
        };

        window.deleteDocument = async (id) => {
            const success = await DB.delete(id);
            if (success) applyFiltersAndRender();
        };

        function showLoading(text) {
            els.loadingText.textContent = text;
            els.loadingOverlay.classList.remove('hidden');
        }

        function hideLoading() {
            els.loadingOverlay.classList.add('hidden');
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
