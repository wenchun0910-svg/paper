<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="systemPageTitle">雲端文庫 - 文件與網站分享系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 日式風格字體與基本設定 */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;600&display=swap');
        
        :root {
            --washi: #F9F8F4; /* 和紙白 */
            --matcha: #8A9A5B; /* 抹茶綠 */
            --ai: #1D2F6F; /* 靛藍 */
            --sumi: #2C2C2C; /* 墨黑 */
            --sakura: #F2E3E5; /* 櫻花粉 */
            --wood: #D4B59E; /* 原木色 */
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--washi);
            color: var(--sumi);
        }

        h1, h2, h3, .serif-font {
            font-family: 'Noto Serif TC', serif;
        }

        .noren-header {
            background-color: var(--ai);
            color: white;
            border-bottom: 4px solid var(--matcha);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border-color: var(--matcha);
        }

        /* 隱藏捲軸但保留功能 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* 模態框淡入動畫 */
        .modal-fade {
            animation: fadeIn 0.2s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- 頂部導覽列 (暖簾風格) -->
    <header class="noren-header py-4 px-6 flex justify-between items-center sticky top-0 z-40">
        <div class="flex items-center gap-3">
            <i class="fa-solid fa-fan text-2xl text-[var(--washi)]"></i>
            <h1 id="systemHeaderTitle" class="text-2xl font-semibold tracking-wider">雲端文庫</h1>
        </div>
        <div class="flex items-center gap-4">
            <div id="userInfo" class="hidden text-sm md:text-base">
                <span class="mr-2"><i class="fa-solid fa-user-circle"></i> <span id="currentUserName"></span> (<span id="currentUserRoleLabel"></span>)</span>
                <button onclick="app.logout()" class="hover:text-[var(--sakura)] underline transition">登出</button>
            </div>
            <button id="loginBtn" onclick="app.openModal('loginModal')" class="bg-[var(--washi)] text-[var(--ai)] px-4 py-1.5 rounded-sm hover:bg-gray-200 transition text-sm font-medium">
                登入
            </button>
        </div>
    </header>

    <!-- 主內容區 -->
    <main class="flex-grow container mx-auto px-4 py-8 max-w-6xl">
        
        <!-- 管理員工具列 (登入後顯示) -->
        <div id="adminToolbar" class="hidden mb-8 bg-white p-4 rounded-md shadow-sm border border-[var(--wood)] flex flex-wrap gap-4 items-center justify-between">
            <div class="flex gap-3">
                <button onclick="app.openModal('resourceModal')" class="bg-[var(--matcha)] text-white px-4 py-2 rounded-sm hover:bg-opacity-90 transition shadow-sm">
                    <i class="fa-solid fa-plus mr-1"></i> 新增文件 / 網站
                </button>
            </div>
            <div id="accountManagerBtn" class="hidden">
                <button onclick="app.openModal('settingsModal')" class="border border-[var(--ai)] text-[var(--ai)] px-4 py-2 rounded-sm hover:bg-[var(--ai)] hover:text-white transition shadow-sm">
                    <i class="fa-solid fa-sliders-h mr-1"></i> 系統設定
                </button>
            </div>
        </div>

        <!-- 搜尋與篩選列 -->
        <div class="mb-6 flex flex-col md:flex-row gap-4 items-center justify-between bg-white p-4 rounded-md shadow-sm">
            <div class="flex-grow w-full md:w-auto relative">
                <i class="fa-solid fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                <input type="text" id="searchInput" placeholder="搜尋標題或描述..." class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-sm focus:outline-none focus:border-[var(--ai)] focus:ring-1 focus:ring-[var(--ai)] transition" oninput="app.handleSearch()">
            </div>
            <div class="w-full md:w-64 flex gap-2">
                <select id="typeFilter" class="w-1/2 p-2 border border-gray-300 rounded-sm focus:outline-none focus:border-[var(--ai)]" onchange="app.handleFilter()">
                    <option value="all">所有類型</option>
                    <option value="document">文件</option>
                    <option value="link">網站連結</option>
                </select>
                <select id="categoryFilter" class="w-1/2 p-2 border border-gray-300 rounded-sm focus:outline-none focus:border-[var(--ai)]" onchange="app.handleFilter()">
                    <option value="all">所有分類</option>
                    <!-- 動態生成分類 -->
                </select>
            </div>
        </div>

        <!-- 資源列表 -->
        <div id="resourceContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-6">
            <!-- 資源卡片會動態生成在這裡 -->
            <div class="text-center col-span-full py-12 text-gray-500">
                <i class="fa-solid fa-spinner fa-spin text-3xl mb-3"></i>
                <p>資料載入中，請稍候...</p>
            </div>
        </div>

        <!-- 分頁控制 -->
        <div id="pagination" class="mt-8 flex justify-center items-center gap-2">
            <!-- 分頁按鈕動態生成 -->
        </div>

    </main>

    <footer class="text-center py-6 text-sm text-gray-500 border-t border-gray-200 mt-auto">
        <p id="systemFooterTitle">&copy; 2026 雲端文庫. All rights reserved.</p>
    </footer>

    <!-- ================= 模態框 (Modals) ================= -->

    <!-- 1. 登入模態框 -->
    <div id="loginModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-md shadow-xl w-full max-w-md overflow-hidden modal-fade">
            <div class="bg-[var(--ai)] text-white px-6 py-4 flex justify-between items-center">
                <h2 class="text-lg font-semibold serif-font"><i class="fa-solid fa-door-open mr-2"></i>系統登入</h2>
                <button onclick="app.closeModal('loginModal')" class="hover:text-gray-300"><i class="fa-solid fa-times"></i></button>
            </div>
            <div class="p-6">
                <div id="loginError" class="hidden mb-4 p-3 bg-red-100 text-red-700 rounded-sm text-sm"></div>
                <div id="initAdminNotice" class="hidden mb-4 p-3 bg-blue-50 text-[var(--ai)] border border-blue-200 rounded-sm text-sm">
                    <i class="fa-solid fa-info-circle mr-1"></i> 系統目前無帳號，請建立首位管理員。
                </div>
                
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">帳號</label>
                    <input type="text" id="loginUsername" class="w-full p-2 border border-gray-300 rounded-sm focus:outline-none focus:border-[var(--ai)]">
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-1">密碼</label>
                    <input type="password" id="loginPassword" class="w-full p-2 border border-gray-300 rounded-sm focus:outline-none focus:border-[var(--ai)]">
                </div>
                <button id="submitLoginBtn" onclick="app.processLogin()" class="w-full bg-[var(--ai)] text-white py-2 rounded-sm hover:bg-opacity-90 transition font-medium">登入</button>
            </div>
        </div>
    </div>

    <!-- 2. 新增/編輯 資源模態框 -->
    <div id="resourceModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-md shadow-xl w-full max-w-lg overflow-hidden modal-fade">
            <div class="bg-[var(--matcha)] text-white px-6 py-4 flex justify-between items-center">
                <h2 id="resourceModalTitle" class="text-lg font-semibold serif-font">新增文件 / 網站</h2>
                <button onclick="app.closeModal('resourceModal')" class="hover:text-gray-200"><i class="fa-solid fa-times"></i></button>
            </div>
            <div class="p-6 max-h-[80vh] overflow-y-auto no-scrollbar">
                <input type="hidden" id="resId">
                
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">類型 <span class="text-red-500">*</span></label>
                    <div class="flex gap-4">
                        <label class="flex items-center cursor-pointer">
                            <input type="radio" name="resType" value="document" checked class="mr-2 text-[var(--matcha)] focus:ring-[var(--matcha)]"> 
                            <i class="fa-regular fa-file-alt mr-1 text-gray-500"></i> 文件檔案
                        </label>
                        <label class="flex items-center cursor-pointer">
                            <input type="radio" name="resType" value="link" class="mr-2 text-[var(--matcha)] focus:ring-[var(--matcha)]"> 
                            <i class="fa-solid fa-link mr-1 text-gray-500"></i> 網站連結
                        </label>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">標題 <span class="text-red-500">*</span></label>
                    <input type="text" id="resTitle" placeholder="例如：2026年專案計畫書" class="w-full p-2 border border-gray-300 rounded-sm focus:outline-none focus:border-[var(--matcha)]">
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">連結 URL <span class="text-red-500">*</span></label>
                    <input type="url" id="resUrl" placeholder="https://..." class="w-full p-2 border border-gray-300 rounded-sm focus:outline-none focus:border-[var(--matcha)]">
                    <p class="text-xs text-gray-500 mt-1">請輸入完整的網址（包含 http:// 或 https://）</p>
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">分類 <span class="text-red-500">*</span></label>
                    <select id="resCategory" class="w-full p-2 border border-gray-300 rounded-sm focus:outline-none focus:border-[var(--matcha)] bg-white">
                        <option value="">請選擇分類</option>
                        <!-- 動態填充選項 -->
                    </select>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-1">描述 (選填)</label>
                    <textarea id="resDesc" rows="3" class="w-full p-2 border border-gray-300 rounded-sm focus:outline-none focus:border-[var(--matcha)]" placeholder="簡單描述內容..."></textarea>
                </div>

                <div class="flex justify-end gap-3">
                    <button onclick="app.closeModal('resourceModal')" class="px-4 py-2 border border-gray-300 rounded-sm hover:bg-gray-50 transition">取消</button>
                    <button onclick="app.saveResource()" class="bg-[var(--matcha)] text-white px-6 py-2 rounded-sm hover:bg-opacity-90 transition">儲存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 3. 系統設定模態框 (帳號與分類管理，僅管理員可見) -->
    <div id="settingsModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white rounded-md shadow-xl w-full max-w-4xl overflow-hidden modal-fade flex flex-col max-h-[90vh]">
            <div class="bg-gray-100 text-[var(--sumi)] px-6 py-4 flex justify-between items-center border-b shrink-0">
                <h2 class="text-lg font-bold tracking-wide"><i class="fa-solid fa-sliders-h mr-2"></i>系統設定</h2>
                <button onclick="app.closeModal('settingsModal')" class="text-gray-500 hover:text-gray-800 transition"><i class="fa-solid fa-times"></i></button>
            </div>
            
            <div class="p-6 overflow-y-auto no-scrollbar flex-grow bg-white">
                
                <!-- 基本設定區塊 -->
                <div class="mb-10">
                    <h3 class="font-bold text-lg mb-4 border-l-4 border-[var(--sumi)] pl-2 text-[var(--sumi)] flex items-center gap-2">
                        基本設定
                    </h3>
                    <div class="flex flex-col md:flex-row gap-4 max-w-2xl">
                        <div class="flex-grow">
                            <label class="block text-sm text-gray-500 mb-1">系統名稱</label>
                            <input type="text" id="sysNameInput" placeholder="例如：雲端文庫" class="w-full p-2 border border-gray-300 rounded-sm focus:outline-none focus:border-[var(--ai)]">
                        </div>
                        <div class="flex items-end">
                            <button onclick="app.saveSystemName()" class="bg-gray-50 border border-gray-200 text-gray-600 px-6 py-2 rounded-sm hover:bg-gray-100 transition whitespace-nowrap text-sm h-[42px]">儲存名稱</button>
                        </div>
                    </div>
                </div>

                <!-- 帳號管理區塊 -->
                <div class="mb-10">
                    <h3 class="font-bold text-lg mb-4 border-l-4 border-[var(--sumi)] pl-2 text-[var(--sumi)] flex items-center gap-2">
                        帳號管理
                    </h3>
                    <div class="flex flex-col md:flex-row gap-6">
                        <!-- 帳號列表與管理表格 -->
                        <div class="w-full overflow-x-auto border border-gray-200 rounded-sm">
                            <table class="w-full text-left border-collapse">
                                <thead>
                                    <tr class="bg-[#F9F8F4] text-sm border-b">
                                        <th class="p-3 font-medium text-gray-700 w-1/4">帳號</th>
                                        <th class="p-3 font-medium text-gray-700 w-1/4">密碼</th>
                                        <th class="p-3 font-medium text-gray-700 w-1/4">權限</th>
                                        <th class="p-3 font-medium text-gray-700 text-center w-1/4">刪除</th>
                                    </tr>
                                </thead>
                                <tbody id="userTableBody">
                                    <!-- 用戶列表生成 -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- 分類管理區塊 -->
                <div>
                    <h3 class="font-bold text-lg mb-4 border-l-4 border-[var(--sumi)] pl-2 text-[var(--sumi)] flex items-center gap-2">
                        分類管理
                    </h3>
                    
                    <div class="mb-4">
                        <label class="block text-sm text-gray-500 mb-2">新增分類名稱</label>
                        <div class="flex gap-2 max-w-2xl">
                            <input type="text" id="newCategoryInput" placeholder="例如：生活、科技" class="flex-grow p-2.5 border border-gray-200 rounded-sm focus:border-[var(--matcha)] focus:outline-none bg-gray-50 text-sm">
                            <button onclick="app.saveManagedCategory()" class="bg-gray-50 border border-gray-200 text-gray-600 px-6 py-2.5 rounded-sm hover:bg-gray-100 transition whitespace-nowrap text-sm">新增分類</button>
                        </div>
                    </div>

                    <div class="bg-[#F9F9F9] border border-gray-200 rounded-sm p-5 min-h-[120px]">
                        <p class="text-sm text-gray-400 mb-4">目前的分類清單：</p>
                        <div id="categoryPillList" class="flex flex-wrap gap-3">
                            <!-- 分類標籤動態生成 -->
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- 提示訊息 (Toast) -->
    <div id="toast" class="fixed bottom-5 right-5 transform translate-y-20 opacity-0 transition-all duration-300 bg-gray-800 text-white px-6 py-3 rounded shadow-lg z-[60] flex items-center gap-2">
        <i id="toastIcon" class="fa-solid fa-check-circle text-green-400"></i>
        <span id="toastMsg">操作成功</span>
    </div>

    <!-- Firebase SDK 引入 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, addDoc, updateDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase 初始化與全域變數配置
       const firebaseConfig = {
  apiKey: "AIzaSyDa0NveTZKEo5mODD3XhX_9bA_bPOtcPlQ",
  authDomain: "infor-aded2.firebaseapp.com",
  projectId: "infor-aded2",
  storageBucket: "infor-aded2.firebasestorage.app",
  messagingSenderId: "447138107771",
  appId: "1:447138107771:web:399443bb0e13475d766dde"
};

        const app_firebase = initializeApp(firebaseConfig);
        const auth = getAuth(app_firebase);
        const db = getFirestore(app_firebase);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-wafu-app';
        
        // 集合名稱定義 (遵循嚴格路徑規則)
        const USERS_COLLECTION = 'wafu_users';
        const RESOURCES_COLLECTION = 'wafu_resources';
        const CATEGORIES_COLLECTION = 'wafu_categories';
        const SETTINGS_COLLECTION = 'wafu_settings';

        // 應用程式狀態管理
        window.appState = {
            fbUser: null,        // Firebase 匿名 user
            currentUser: null,   // 系統自訂登入的使用者資料 {id, username, role}
            resources: [],       // 所有文件與連結
            users: [],           // 所有系統帳號 (僅管理員需要)
            categories: [],      // 自動收集的分類
            managedCategories: [], // 管理員設定的分類庫
            systemName: "雲端文庫", // 系統預設名稱
            
            // UI 狀態
            currentPage: 1,
            itemsPerPage: 10,
            searchQuery: "",
            filterType: "all",
            filterCategory: "all"
        };

        // 封裝主邏輯
        window.app = {
            
            // 初始化
            init: async function() {
                try {
                    // 1. Firebase 授權 (要求規則3)
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }

                    // 2. 監聽授權狀態
                    onAuthStateChanged(auth, (user) => {
                        if (user) {
                            window.appState.fbUser = user;
                            this.fetchData();
                        } else {
                            console.error("無法取得 Firebase 授權");
                        }
                    });
                } catch (error) {
                    console.error("初始化失敗:", error);
                    this.showToast("系統初始化失敗，請重新整理", "error");
                }
            },

            // 讀取資料
            fetchData: function() {
                const user = window.appState.fbUser;
                if (!user) return;

                // 監聽資源資料 (要求規則2: 無複雜查詢，全部抓取後於前端處理)
                const resRef = collection(db, 'artifacts', appId, 'public', 'data', RESOURCES_COLLECTION);
                onSnapshot(resRef, (snapshot) => {
                    window.appState.resources = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    this.extractCategories();
                    this.renderResources();
                }, (error) => {
                    console.error("讀取資源失敗:", error);
                });

                // 監聽分類資料
                const catRef = collection(db, 'artifacts', appId, 'public', 'data', CATEGORIES_COLLECTION);
                onSnapshot(catRef, (snapshot) => {
                    window.appState.managedCategories = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    
                    // 如果分類是空的且為管理員，自動寫入預設分類
                    if (window.appState.managedCategories.length === 0 && window.appState.currentUser?.role === 'admin') {
                        this.seedDefaultCategories();
                    }
                    
                    this.extractCategories();
                    this.renderCategoryManager();
                }, (error) => {
                    console.error("讀取分類失敗:", error);
                });

                // 監聽系統設定 (系統名稱)
                const sysRef = doc(db, 'artifacts', appId, 'public', 'data', SETTINGS_COLLECTION, 'global');
                onSnapshot(sysRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        if (data.systemName) {
                            window.appState.systemName = data.systemName;
                            this.updateSystemNameUI();
                        }
                    } else {
                        // 初始狀態確保 UI 顯示預設值
                        this.updateSystemNameUI();
                    }
                }, (error) => {
                    console.error("讀取系統設定失敗:", error);
                });

                // 監聽帳號資料 (用以驗證登入與管理)
                const usersRef = collection(db, 'artifacts', appId, 'public', 'data', USERS_COLLECTION);
                onSnapshot(usersRef, (snapshot) => {
                    window.appState.users = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    
                    // 檢查系統是否為全新無帳號狀態
                    const initNotice = document.getElementById('initAdminNotice');
                    const loginBtn = document.getElementById('submitLoginBtn');
                    
                    if (window.appState.users.length === 0) {
                        if(initNotice) initNotice.classList.remove('hidden');
                        if(loginBtn) {
                            loginBtn.innerText = "建立並登入管理員";
                            loginBtn.classList.replace('bg-[var(--ai)]', 'bg-[var(--matcha)]');
                        }
                    } else {
                        if(initNotice) initNotice.classList.add('hidden');
                        if(loginBtn) {
                            loginBtn.innerText = "登入";
                            loginBtn.classList.replace('bg-[var(--matcha)]', 'bg-[var(--ai)]');
                        }
                    }

                    // 如果已登入，更新使用者狀態 (可能被管理員刪除或改權限)
                    if (window.appState.currentUser) {
                        const updatedUser = window.appState.users.find(u => u.id === window.appState.currentUser.id);
                        if (!updatedUser) {
                            this.logout(); // 帳號被刪除
                        } else {
                            window.appState.currentUser = updatedUser;
                            this.updateUI();
                            if(updatedUser.role === 'admin') this.renderUsersTable();
                        }
                    }
                }, (error) => {
                    console.error("讀取帳號失敗:", error);
                });
            },

            // ================= 登入與帳號管理 =================

            processLogin: async function() {
                const user = window.appState.fbUser;
                if (!user) return;

                const usernameInput = document.getElementById('loginUsername').value.trim();
                const passwordInput = document.getElementById('loginPassword').value.trim();
                const errorDiv = document.getElementById('loginError');

                if (!usernameInput || !passwordInput) {
                    errorDiv.innerText = "請輸入帳號與密碼";
                    errorDiv.classList.remove('hidden');
                    return;
                }

                // 系統無帳號 -> 初始化管理員
                if (window.appState.users.length === 0) {
                    try {
                        const usersRef = collection(db, 'artifacts', appId, 'public', 'data', USERS_COLLECTION);
                        const newUser = {
                            username: usernameInput,
                            password: passwordInput, // 註：前端加密意義不大，此為沙盒展示故明碼
                            role: 'admin',
                            createdAt: Date.now()
                        };
                        const docRef = await addDoc(usersRef, newUser);
                        
                        window.appState.currentUser = { id: docRef.id, ...newUser };
                        this.finishLogin();
                        this.showToast("管理員帳號建立成功");
                    } catch (e) {
                        errorDiv.innerText = "建立失敗：" + e.message;
                        errorDiv.classList.remove('hidden');
                    }
                    return;
                }

                // 一般登入驗證
                const matchedUser = window.appState.users.find(u => u.username === usernameInput && u.password === passwordInput);
                
                if (matchedUser) {
                    window.appState.currentUser = matchedUser;
                    this.finishLogin();
                    this.showToast("登入成功");
                } else {
                    errorDiv.innerText = "帳號或密碼錯誤";
                    errorDiv.classList.remove('hidden');
                }
            },

            finishLogin: function() {
                document.getElementById('loginUsername').value = '';
                document.getElementById('loginPassword').value = '';
                document.getElementById('loginError').classList.add('hidden');
                this.closeModal('loginModal');
                this.updateUI();
            },

            logout: function() {
                window.appState.currentUser = null;
                this.updateUI();
                this.showToast("已登出");
            },

            updateUI: function() {
                const curUser = window.appState.currentUser;
                const loginBtn = document.getElementById('loginBtn');
                const userInfo = document.getElementById('userInfo');
                const adminToolbar = document.getElementById('adminToolbar');
                const accountManagerBtn = document.getElementById('accountManagerBtn');

                if (curUser) {
                    // 已登入
                    loginBtn.classList.add('hidden');
                    userInfo.classList.remove('hidden');
                    document.getElementById('currentUserName').innerText = curUser.username;
                    document.getElementById('currentUserRoleLabel').innerText = curUser.role === 'admin' ? '管理員' : '協作者';
                    
                    adminToolbar.classList.remove('hidden');
                    
                    if (curUser.role === 'admin') {

                    } else {
                        accountManagerBtn.classList.add('hidden');

                } else {

                    loginBtn.classList.remove('hidden');
                    userInfo.classList.add('hidden');
                    adminToolbar.classList.add('hidden');
                    this.closeModal('settingsModal');

            renderResources: function() {
                const container = document.getElementById('resourceContainer');
                const pagination = document.getElementById('pagination');
                
                let filtered = window.appState.resources;

                // 1. 關鍵字搜尋
                if (window.appState.searchQuery) {
                    const q = window.appState.searchQuery;
                    filtered = filtered.filter(r => 
                        (r.title && r.title.toLowerCase().includes(q)) || 
                        (r.description && r.description.toLowerCase().includes(q)) ||
                        (r.category && r.category.toLowerCase().includes(q))
                    );
                }

                // 2. 類型過濾
                if (window.appState.filterType !== 'all') {
                    filtered = filtered.filter(r => r.type === window.appState.filterType);
                }

                // 3. 分類過濾
                if (window.appState.filterCategory !== 'all') {
                    filtered = filtered.filter(r => r.category === window.appState.filterCategory);
                }

                // 4. 排序: 最新在前面
                filtered.sort((a, b) => b.createdAt - a.createdAt);

                // 5. 分頁
                const totalItems = filtered.length;
                const totalPages = Math.ceil(totalItems / window.appState.itemsPerPage) || 1;
                
                // 確保當前頁數不超出範圍
                if (window.appState.currentPage > totalPages) window.appState.currentPage = totalPages;
                
                const startIndex = (window.appState.currentPage - 1) * window.appState.itemsPerPage;
                const paginated = filtered.slice(startIndex, startIndex + window.appState.itemsPerPage);

                // 渲染卡片
                container.innerHTML = '';
                
                if (paginated.length === 0) {
                    container.innerHTML = `
                        <div class="col-span-full py-16 text-center text-gray-500 bg-white rounded-md border border-dashed border-gray-300">
                            <i class="fa-solid fa-folder-open text-4xl mb-3 text-gray-300"></i>
                            <p>沒有找到符合的文件或網站</p>
                        </div>
                    `;
                } else {
                    paginated.forEach(item => {
                        const isDoc = item.type === 'document';
                        const iconClass = isDoc ? 'fa-file-alt text-[var(--ai)]' : 'fa-link text-[var(--matcha)]';
                        const typeLabel = isDoc ? '文件' : '網站';
                        
                        // 權限判斷
                        const curUser = window.appState.currentUser;
                        let canEdit = false;
                        if (curUser) {
                            if (curUser.role === 'admin') canEdit = true;
                            if (curUser.role === 'collaborator' && item.authorId === curUser.id) canEdit = true;
                        }

                        const dateStr = new Date(item.createdAt).toLocaleDateString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit' });

                        const card = document.createElement('div');
                        card.className = "bg-white p-5 rounded-md border border-gray-200 card-hover flex flex-col h-full shadow-sm relative overflow-hidden";
                        
                        // 左側顏色條
                        const barColor = isDoc ? 'bg-[var(--ai)]' : 'bg-[var(--matcha)]';
                        
                        card.innerHTML = `
                            <div class="absolute left-0 top-0 bottom-0 w-1 ${barColor} opacity-70"></div>
                            <div class="flex justify-between items-start mb-3">
                                <span class="text-xs font-medium px-2 py-1 rounded bg-gray-100 text-gray-600 border border-gray-200">
                                    ${item.category || '未分類'}
                                </span>
                                <div class="flex items-center gap-2">
                                    <span class="text-xs text-gray-400" title="觀看次數"><i class="fa-regular fa-eye"></i> ${item.views || 0}</span>
                                    <span class="text-xs text-gray-400 bg-gray-50 px-2 py-0.5 rounded border"><i class="fa-solid ${iconClass} mr-1"></i>${typeLabel}</span>
                                </div>
                            </div>
                            
                            <h3 class="text-lg font-bold mb-2 text-[var(--sumi)] line-clamp-2 leading-snug">
                                <a href="#" onclick="app.recordViewAndOpen('${item.id}', '${item.url}'); return false;" class="hover:text-[var(--matcha)] transition">
                                    ${item.title}
                                </a>
                            </h3>
                            
                            <p class="text-sm text-gray-600 mb-4 flex-grow line-clamp-3 leading-relaxed">
                                ${item.description || ''}
                            </p>
                            
                            <div class="mt-auto pt-4 border-t border-gray-100 flex justify-between items-center text-xs text-gray-500">
                                <div>
                                    <i class="fa-regular fa-calendar-alt"></i> ${dateStr} <br>
                                    <span class="mt-1 inline-block"><i class="fa-solid fa-pen-nib"></i> ${item.authorName}</span>
                                </div>
                                
                                ${canEdit ? `
                                    <div class="flex gap-2">
                                        <button onclick="app.editResource('${item.id}')" class="p-1.5 text-blue-500 hover:bg-blue-50 rounded transition" title="編輯"><i class="fa-solid fa-edit"></i></button>
                                        <button onclick="app.deleteResource('${item.id}')" class="p-1.5 text-red-500 hover:bg-red-50 rounded transition" title="刪除"><i class="fa-solid fa-trash-alt"></i></button>
                                    </div>
                                ` : `
                                    <a href="#" onclick="app.recordViewAndOpen('${item.id}', '${item.url}'); return false;" class="text-[var(--ai)] font-medium hover:underline bg-[var(--washi)] px-3 py-1.5 rounded-sm transition">
                                        前往查看 <i class="fa-solid fa-arrow-right text-[10px]"></i>
                                    </a>
                                `}
                            </div>
                        `;
                        container.appendChild(card);
                    });
                }

                // 渲染分頁按鈕
                pagination.innerHTML = '';
                if (totalPages > 1) {
                    // 上一頁
                    pagination.innerHTML += `<button onclick="app.changePage(${window.appState.currentPage - 1})" class="px-3 py-1 border rounded-sm ${window.appState.currentPage === 1 ? 'text-gray-300 border-gray-200 cursor-not-allowed' : 'text-gray-700 hover:bg-gray-50'}" ${window.appState.currentPage === 1 ? 'disabled' : ''}><i class="fa-solid fa-chevron-left text-xs"></i></button>`;
                    
                    // 頁碼
                    for (let i = 1; i <= totalPages; i++) {
                        if (i === 1 || i === totalPages || (i >= window.appState.currentPage - 1 && i <= window.appState.currentPage + 1)) {
                            const activeClass = i === window.appState.currentPage ? 'bg-[var(--ai)] text-white border-[var(--ai)]' : 'bg-white text-gray-700 border-gray-300 hover:bg-gray-50';
                            pagination.innerHTML += `<button onclick="app.changePage(${i})" class="px-3 py-1 border rounded-sm ${activeClass}">${i}</button>`;
                        } else if (i === window.appState.currentPage - 2 || i === window.appState.currentPage + 2) {
                            pagination.innerHTML += `<span class="px-2 text-gray-400">...</span>`;
                        }
                    }

                    // 下一頁
                    pagination.innerHTML += `<button onclick="app.changePage(${window.appState.currentPage + 1})" class="px-3 py-1 border rounded-sm ${window.appState.currentPage === totalPages ? 'text-gray-300 border-gray-200 cursor-not-allowed' : 'text-gray-700 hover:bg-gray-50'}" ${window.appState.currentPage === totalPages ? 'disabled' : ''}><i class="fa-solid fa-chevron-right text-xs"></i></button>`;
                }
            },

            // 儲存資源 (新增/修改)
            saveResource: async function() {
                const curUser = window.appState.currentUser;
                const fbUser = window.appState.fbUser;
                if (!fbUser || !curUser) {
                    this.showToast("權限不足，請先登入", "error"); return;
                }

                const id = document.getElementById('resId').value;
                const type = document.querySelector('input[name="resType"]:checked').value;
                const title = document.getElementById('resTitle').value.trim();
                const url = document.getElementById('resUrl').value.trim();
                const category = document.getElementById('resCategory').value.trim();
                const description = document.getElementById('resDesc').value.trim();

                if (!title || !url || !category) {
                    this.showToast("請填寫所有必填欄位 (*)", "error"); return;
                }

                // 簡單的 URL 格式修復
                let finalUrl = url;
                if (!/^https?:\/\//i.test(finalUrl)) {
                    finalUrl = 'https://' + finalUrl;
                }

                const resData = {
                    type,
                    title,
                    url: finalUrl,
                    category,
                    description,
                    updatedAt: Date.now()
                };

                try {
                    const colRef = collection(db, 'artifacts', appId, 'public', 'data', RESOURCES_COLLECTION);
                    
                    if (id) {
                        // 檢查權限 (前端檢查，後端因為是 public data 任何人只要登入FB就能寫，這裡是邏輯防護)
                        const existing = window.appState.resources.find(r => r.id === id);
                        if (curUser.role !== 'admin' && existing.authorId !== curUser.id) {
                            this.showToast("您只能修改自己建立的項目", "error"); return;
                        }
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', RESOURCES_COLLECTION, id), resData);
                        this.showToast("資料已更新");
                    } else {
                        resData.authorId = curUser.id;
                        resData.authorName = curUser.username;
                        resData.createdAt = Date.now();
                        resData.views = 0;
                        await addDoc(colRef, resData);
                        this.showToast("新增成功");
                    }
                    this.closeModal('resourceModal');
                } catch(e) {
                    console.error(e);
                    this.showToast("儲存失敗", "error");
                }
            },

            editResource: function(id) {
                const item = window.appState.resources.find(r => r.id === id);
                if(!item) return;

                document.getElementById('resId').value = item.id;
                document.querySelector(`input[name="resType"][value="${item.type}"]`).checked = true;
                document.getElementById('resTitle').value = item.title;
                document.getElementById('resUrl').value = item.url;
                document.getElementById('resCategory').value = item.category;
                document.getElementById('resDesc').value = item.description || '';
                
                document.getElementById('resourceModalTitle').innerText = '編輯文件 / 網站';
                this.openModal('resourceModal');
            },

            deleteResource: async function(id) {
                const curUser = window.appState.currentUser;
                if (!curUser) return;
                
                const item = window.appState.resources.find(r => r.id === id);
                if (curUser.role !== 'admin' && item.authorId !== curUser.id) {
                    this.showToast("您只能刪除自己建立的項目", "error"); return;
                }

                if (window.confirm(`確定要刪除「${item.title}」嗎？`)) {
                    try {
                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', RESOURCES_COLLECTION, id));
                        this.showToast("已刪除");
                    } catch(e) {
                        console.error(e);
                        this.showToast("刪除失敗", "error");
                    }
                }
            },

            // 記錄觀看次數並開啟連結
            recordViewAndOpen: async function(id, url) {
                // 開啟新分頁
                window.open(url, '_blank', 'noopener,noreferrer');
                
                // 只有在取得匿名 fbUser 的情況下才能寫入 Firestore
                if (window.appState.fbUser) {
                    try {
                        const docRef = doc(db, 'artifacts', appId, 'public', 'data', RESOURCES_COLLECTION, id);
                        const item = window.appState.resources.find(r => r.id === id);
                        if (item) {
                            await updateDoc(docRef, { views: (item.views || 0) + 1 });
                        }
                    } catch (e) {
                        console.error("更新觀看次數失敗", e);
                    }
                }
            },

            // ================= 共用工具 =================

            openModal: function(modalId) {
                if (modalId === 'resourceModal' && !document.getElementById('resId').value) {
                    // 新增模式，清空表單
                    document.getElementById('resId').value = '';
                    document.getElementById('resTitle').value = '';
                    document.getElementById('resUrl').value = '';
                    document.getElementById('resCategory').value = '';
                    document.getElementById('resDesc').value = '';
                    document.getElementById('resourceModalTitle').innerText = '新增文件 / 網站';
                }
                document.getElementById(modalId).classList.remove('hidden');
            },

            closeModal: function(modalId) {
                document.getElementById(modalId).classList.add('hidden');
            },

            showToast: function(msg, type = 'success') {
                const toast = document.getElementById('toast');
                const icon = document.getElementById('toastIcon');
                document.getElementById('toastMsg').innerText = msg;
                
                if (type === 'error') {
                    icon.className = 'fa-solid fa-exclamation-circle text-red-400';
                } else {
                    icon.className = 'fa-solid fa-check-circle text-green-400';
                }

                toast.classList.remove('translate-y-20', 'opacity-0');
                
                setTimeout(() => {
                    toast.classList.add('translate-y-20', 'opacity-0');
                }, 3000);
            }
        };

        // 啟動應用程式
        window.addEventListener('DOMContentLoaded', () => {
            window.app.init();
        });

    </script>
</body>
</html>
